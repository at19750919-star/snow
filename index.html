<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>世紀髮廊 景美店</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.5/main.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar-scheduler@5.11.5/main.min.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<body>
  <!-- 主題切換按鈕 -->
  <button type="button" class="theme-toggle-btn" id="themeToggleBtn" title="切換彈窗主題">
    <span class="toggle-icon-dark material-symbols-outlined">dark_mode</span>
    <span class="toggle-icon-light material-symbols-outlined">light_mode</span>
  </button>
  <div id="calendar-container">
    <div id="calendar"></div>
    <div id="appointmentModal" class="modal">
      <div class="modal-content">
        <span class="close-button">&times;</span>
        <form id="appointmentForm">
          <input type="hidden" id="event_id" name="event_id">
          <input type="hidden" id="start_time" name="start_time">
          <input type="hidden" id="employee_id" name="employee_id">
          <input type="hidden" id="amount_input" name="amount_input">

          <div class="modal-layout-grid">
            <!-- [彈窗左欄] 藍色卡片區域：顧客資料與預約時長 -->
            <div class="modal-col">
              <div class="modal-section blue-card-section" id="appointment-info-card">
                <label>預約類型</label>
                <div class="type-toggle-container">
                  <input type="radio" id="appointment-normal" name="appointment_type" value="normal" checked>
                  <input type="radio" id="appointment-blocked" name="appointment_type" value="blocked">
                  <label for="appointment-normal" class="toggle-label left">一般預約</label>
                  <label for="appointment-blocked" class="toggle-label right">不約時段</label>
                  <span class="sliding-glider"></span>
                </div>

                <hr style="border:none; border-top:1px solid #CAC4D0; margin:8px -2;">

                <div class="form-row">
                  <label for="minute_select">時間 (分)</label>
                  <select id="minute_select" name="minute_select"></select>
                </div>

                <!-- [功能] 預約時長選擇：15分至3小時 -->
                <div class="form-row">
                  <label for="duration_select">預約時長</label>
                  <select id="duration_select" name="duration_select">
                    <option value="15">15 分鐘</option>
                    <option value="30">30 分鐘</option>
                    <option value="45">45 分鐘</option>
                    <option value="60">1 小時</option>
                    <option value="90">1.5 小時</option>
                    <option value="120">2 小時</option>
                    <option value="180">3 小時</option>
                  </select>
                </div>

                <div id="customer-fields-left">
                  <hr style="border:none; border-top:1px solid #CAC4D0; margin:8px 0;">

                  <div class="form-row">
                    <label for="customer_name">顧客姓名</label>
                    <input type="text" id="customer_name" name="customer_name" placeholder="請輸入顧客姓名">
                  </div>

                  <div class="form-row">
                    <label for="customer_phone">電話</label>
                    <input type="tel" id="customer_phone" name="customer_phone" inputmode="numeric" autocomplete="off"
                      placeholder="09xx-xxx-xxx">
                  </div>

                  <div class="form-row">
                    <label for="service_id">項目 (選填)</label>
                    <select id="service_id" name="service_id">

                      <option value="剪髮">剪髮</option>
                      <option value="染">染</option>
                      <option value="燙">燙</option>
                      <option value="染+燙">染+燙</option>
                      <option value="頭皮護理">頭皮護理</option>

                  </div>
                </div>

                <label for="notes">備註</label>
                <textarea id="notes" name="notes" rows="3" placeholder="請輸入備註資訊..."></textarea>
              </div>
            </div>

            <!-- [彈窗右欄] 結帳綠卡區域：選擇剪髮/染燙項目與助理 -->
            <div class="modal-col settlement-col" id="settlement-col">
              <div class="modal-section settlement-section">
                <!-- ====== A. 子卡片：剪髮項目 ====== -->

                  <div class="price-group">

                    <!-- B. 常用項目置頂 -->

                    <label class="price-item"><span class="price-label"><input type="radio" name="cut_price" value="350"

                    <label class="price-item"><span class="price-label"><input type="radio" name="cut_price" value="900"

                <!-- ====== A. 子卡片：燙髮 ====== -->
                <div class="settlement-sub-card">
                  <label class="sub-card-title">燙髮</label>
                  <div class="price-group">
                    <input type="radio" name="perm_price" value="0" data-cost="0" style="display:none;" checked>
                    <label class="price-item"><span class="price-label"><input type="radio" name="perm_price" value="700"
                          data-cost="0"></span> <span class="price-val">$ 700</span></label>
                    <label class="price-item"><span class="price-label"><input type="radio" name="perm_price" value="1200"

                    <label class="price-item"><span class="price-label"><input type="radio" name="perm_price" value="1600"

                    <label class="price-item"><span class="price-label"><input type="radio" name="perm_price" value="1800"

                    <label class="price-item"><span class="price-label"><input type="radio" name="perm_price" value="2600"

                    <label class="price-item"><span class="price-label"><input type="radio" name="perm_price" value="3200"

                        <option value="">-- 無助理 --</option>
                        <option value="陳翎">陳翎</option>

    <div id="leaveModal" class="modal">

        報表

    <div id="lookup-trigger-placeholder" hidden>

    <!-- ====== 警告名單 Modal ====== -->

    <div id="lookupModal" class="modal">
      <div class="modal-content lookup-modal-content">
        <span class="close-button lookup-close-button">&times;</span>
        <h3 style="margin-top:0;">&#x9810;&#x7D04;&#x67E5;&#x8A62;</h3>
        <div class="lookup-controls">
          <label for="lookup-phone" class="lookup-label">&#x96FB;&#x8A71;</label>
          <input type="tel" id="lookup-phone" inputmode="numeric" autocomplete="off" placeholder="09xx-xxx-xxx">

    <div id="notes-section">
      <div class="notes-container">
        <div class="notes-header">
          <h4>留言板</h4>
          <div class="notes-meta"><span>未儲存</span></div>
          <button id="save-notes-btn" type="button">💾 儲存今日留言</button>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.5/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar-scheduler@5.11.5/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.5/locales/zh-tw.js"></script>

    <script>
      // 後端 Google Apps Script 網址
      const APPS_SCRIPT_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyICaHAciRLstbnMvKLxkCopi7oxblP4goUSD8yj2CI6SmugltRcQOwTeBBiHS99VzW2Q/exec';

      // 全域 escapeHtml（防 XSS）
      function escapeHtml(value) {
        return String(value == null ? '' : value).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
      }
      // 全域 showToast（跨 IIFE 共用）
      function showToast(message, type = 'info', duration = 2000) {
        let container = document.getElementById('toast-container');
        if (!container) { container = document.createElement('div'); container.id = 'toast-container'; document.body.appendChild(container); }
        const toast = document.createElement('div');
        toast.className = `toast toast--${type}`; toast.textContent = message;
        container.appendChild(toast);
        requestAnimationFrame(() => toast.classList.add('is-visible'));
        window.setTimeout(() => { toast.classList.remove('is-visible'); toast.addEventListener('transitionend', () => toast.remove(), { once: true }); }, duration);
      }
      const RESOURCE_LIST = [
        { id: '1', title: '店長' },
        { id: '2', title: '雅婷' },
        { id: '3', title: '小白' }
      ];
      const DESIGNER_NAME_BY_ID = {
        '1': '店長',
        '2': '雅婷',
        '3': '小白'
      };
      const MOBILE_RESOURCE_STORAGE_KEY = 'sj_mobile_resource_id';
      const MOBILE_RESOURCE_MEDIA_QUERY = '(max-width: 1024px)';

      (function () {
        function getDesignerNameById(id) {
          const rid = String(id || '').trim();
          if (!rid) return '';
          if (DESIGNER_NAME_BY_ID[rid]) return DESIGNER_NAME_BY_ID[rid];
          const res = Array.isArray(RESOURCE_LIST) ? RESOURCE_LIST.find(r => String(r.id) === rid) : null;
          return res ? res.title : '';
        }
        let employeeLeaveData = [];
        const ymd = d => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        let currentYmd = null;
        let selectedDate = null;
        let calendar;
        let perResourceAxisTimer = null;
        let mobileSelectedResourceId = null;
        let displayTotal = 0;  // 全域變數儲存總金額

        let appointmentModal, leaveModal, reportModal, lookupModal, warnlistModal;
        let appointmentCloseButton, leaveCloseButton, reportCloseButton, lookupCloseButton, warnlistCloseButton;
        let form, leaveForm, notesTextarea, phoneEl, customerFields;
        let submitBtn, deleteBtn, eventIdInput, assistantSelect, amountInput, deleteLeaveBtn, unsetPaidBtn;
        let appointmentContent, appointmentActions, appointmentActionsAnchor, appointmentInfoCard;
        let lastVisitInfo;
        let lastVisitInfoRight;
        let lastVisitLabelValue = '';
        let lastVisitPhoneValue = '';
        let lastVisitDesignerValue = '';

        /* ====== API 請求優化：debounce + cache ====== */
        function debounce(fn, ms) {
          let timer;
          return function (...args) { clearTimeout(timer); timer = setTimeout(() => fn.apply(this, args), ms); };
        }

        /* 簡易快取：key → { data, ts }，預設 5 分鐘 */
        const _apiCache = {};
        const API_CACHE_TTL = 5 * 60 * 1000;
        function cachedFetch(url, ttl = API_CACHE_TTL) {
          const now = Date.now();
          const cached = _apiCache[url];
          if (cached && (now - cached.ts) < ttl) return Promise.resolve(cached.data);
          return fetch(url, { method: 'GET', mode: 'cors' }).then(r => r.json()).then(data => {
            _apiCache[url] = { data, ts: Date.now() };
            return data;
          });
        }
        /* 寫入操作後，清除相關快取 */
        function invalidateCache(keyword) {
          Object.keys(_apiCache).forEach(k => { if (k.includes(keyword)) delete _apiCache[k]; });
        }

        /* 防止同一個 action 重複併發：回傳進行中的 Promise */
        const _inflightRequests = {};
        function deduplicatedFetch(url) {
          if (_inflightRequests[url]) return _inflightRequests[url];
          _inflightRequests[url] = cachedFetch(url).finally(() => { delete _inflightRequests[url]; });
          return _inflightRequests[url];
        }

        /* ===== 主題切換：MD3 亮色 ↔ Glassmorphism 暗色 ===== */
        (function initThemeToggle() {
          const saved = localStorage.getItem('modal-theme');
          if (saved === 'glass') document.body.classList.add('theme-glass');
          document.addEventListener('click', function (e) {
            const btn = e.target.closest('#themeToggleBtn');
            if (!btn) return;
            document.body.classList.toggle('theme-glass');
            const isGlass = document.body.classList.contains('theme-glass');
            localStorage.setItem('modal-theme', isGlass ? 'glass' : 'md3');
          });
        })();

        /* 自訂金額 focus 時全選，方便直接覆蓋輸入 */
        document.addEventListener('focusin', function (e) {
          if (e.target.classList.contains('custom-price-input')) e.target.select();
        });
        /* 自訂金額 blur 時，空值歸零 */
        document.addEventListener('focusout', function (e) {
          if (e.target.classList.contains('custom-price-input') && !e.target.value) e.target.value = '0';
        });
        /* 助理 select：有值時文字變深色，空值時保持淺色 */
        document.addEventListener('change', function (e) {
          if (e.target.id === 'assistant_select') {
            e.target.style.color = e.target.value ? '' : '';
            e.target.classList.toggle('has-value', !!e.target.value);
          }
        });

        document.addEventListener('DOMContentLoaded', function () {
          const calendarEl = document.getElementById('calendar');

            mobileSelectedResourceId = ensureMobileResourceId();
            calendarEl.setAttribute('data-mobile-resource', mobileSelectedResourceId);
          }
          appointmentModal = document.getElementById('appointmentModal');

          deleteLeaveBtn = document.getElementById('deleteLeaveBtn');

          function placeAppointmentActions(mode) {
            if (!appointmentActions || !appointmentInfoCard) return;
            /* 不論 create/edit，按鈕一律放在左欄藍卡內底部 */

            else if (appointmentModal) appointmentModal.classList.remove('is-create');
            appointmentInfoCard.appendChild(appointmentActions);
          }

          async function fetchDailyNote(dStr) {
            const meta = document.querySelector('.notes-meta span');
            const notesTextarea = document.getElementById('notes-content');
            notesTextarea.value = '';
            notesTextarea.placeholder = '留言載入中...';
            meta.textContent = '載入中...';
            try {
              const url = APPS_SCRIPT_WEB_APP_URL + '?action=getNotes&date=' + encodeURIComponent(dStr);
              const j = await deduplicatedFetch(url);
              notesTextarea.value = j.content || '';
              meta.textContent = '已載入';
            } catch (e) {
              meta.textContent = '載入失敗';
              console.error("讀取留言失敗:", e);
            } finally {
              notesTextarea.placeholder = '請輸入備註資訊...';
            }
          }
          const _debouncedFetchNote = debounce(fetchDailyNote, 300);

          initializeCalendar();
          fetchAllCloudData();
          bindEventListeners();

          function initializeCalendar() {
            calendar = new FullCalendar.Calendar(calendarEl, {
              schedulerLicenseKey: 'GPL-My-Project-Is-Open-Source',
              locale: 'zh-tw',
              timeZone: 'local',
              initialView: 'resourceTimeGridDay',
              headerToolbar: false,
              firstDay: 2,
              hiddenDays: [1],
              buttonText: { today: '今', dayGridMonth: '月', resourceTimeGridDay: '日', resourceTimeGridWeek: '週' },
              allDaySlot: false,
              slotMinTime: '12:00:00',
              slotMaxTime: '21:00:00',
              slotDuration: '00:15:00',
              slotLabelInterval: '00:15:00',
              slotLabelFormat: { hour: '2-digit', minute: '2-digit', hour12: false },
              dayHeaderContent: function (arg) {
                const date = arg.date;
                const weekdayMap = ['日', '一', '二', '三', '四', '五', '六'];
                return weekdayMap[date.getDay()];
              },
              displayEventTime: false,
              height: 'auto',
              expandRows: false,
              handleWindowResize: true,
              businessHours: [{ daysOfWeek: [0, 2, 3, 4, 5, 6], startTime: '00:00', endTime: '24:00' }],
              resources: RESOURCE_LIST,
              events: function (info, successCallback, failureCallback) {
                const start = ymd(info.start);
                const end = ymd(info.end);
                const url = APPS_SCRIPT_WEB_APP_URL + '?action=getEvents&start=' + start + '&end=' + end;
                deduplicatedFetch(url).then(data => {
                  successCallback(Array.isArray(data) ? data : []);
                }).catch(failureCallback);
              },
              views: {
                resourceTimeGridWeek: { hiddenDays: [1] },
                dayGridMonth: { eventDisplay: 'auto', displayEventTime: false, fixedWeekCount: false, showNonCurrentDates: false, dayMaxEventRows: 3 }
              },
              selectable: true,
              dateClick: function (info) {
                if (info.view.type === 'dayGridMonth') {
                  calendar.changeView('resourceTimeGridDay', info.date);
                  return;
                }
                if (info.view.type === 'resourceTimeGridDay' || info.view.type === 'resourceTimeGridWeek') {
                  if (window.matchMedia && (window.matchMedia('(pointer: coarse)').matches || window.matchMedia('(max-width: 1024px)').matches)) return;
                  openApptModalForCreate(info.date, info.resource);
                }
              },
              eventClick: function (info) {
                info.jsEvent.preventDefault();
                info.jsEvent.stopPropagation();
                openApptModalForEdit(info.event);
              },
              dayCellDidMount: function (arg) {
                if (arg.view.type !== 'dayGridMonth') return;
                const currentMonth = arg.view.currentStart.getMonth();
                const cellMonth = arg.date.getMonth();
                if (cellMonth !== currentMonth) return;
                const d = arg.date.getDay();
                if (d === 4) arg.el.classList.add('leave-boss');
                if (d === 2) arg.el.classList.add('leave-xiaobai');
                if (d === 0) arg.el.classList.add('leave-yatting');
              },
              selectLongPressDelay: 250,
              datesSet: function (info) {
                updateToolbarTitle(info);
                updateDateScroller(info);
                applyMobileResourceVisibility(info);
                paintMondayClosed(info);
                paintEmployeeLeave();
                syncFullyBookedButtons();
                schedulePerResourceTimeAxis(80);
                // 更新 currentYmd
                currentYmd = ymd(info.start);

                // 在日視圖時,同步 selectedDate
                if (info.view && info.view.type === 'resourceTimeGridDay') {
                  selectedDate = new Date(info.view.currentStart);
                  selectedDate.setHours(12, 0, 0, 0);
                }

                _debouncedFetchNote(currentYmd);
              },
              resourceLabelDidMount: function (arg) {
                const viewType = arg.view?.type || calendar?.view?.type;
                const cushionEl = (arg.el && arg.el.querySelector) ? arg.el.querySelector('.fc-col-header-cell-cushion') : null;
                const hostEl = cushionEl || arg.el;
                if (!hostEl) return;
                hostEl.style.position = 'relative';
                hostEl.style.overflow = 'visible';
                hostEl.classList.add('resource-cushion');
                hostEl.querySelectorAll?.('.header-button-group').forEach(n => n.remove());

                const isDayView = viewType === 'resourceTimeGridDay';
                if (!isDayView) return;

                const rid = String(arg?.resource?.id ?? '');
                const headerBgByRid = { '1': 'var(--resource-col-1-bg)', '2': 'var(--resource-col-2-bg)', '3': 'var(--resource-col-3-bg)' };
                if (headerBgByRid[rid]) {
                  hostEl.dataset.resourceId = rid;
                  if (arg.el && arg.el !== hostEl) arg.el.dataset.resourceId = rid;
                }

                const btnGroup = document.createElement('div');
                btnGroup.className = 'header-button-group';

                const leaveIconButton = document.createElement('button');
                leaveIconButton.type = 'button';
                leaveIconButton.className = 'leave-icon-button';
                leaveIconButton.textContent = '排休';
                btnGroup.appendChild(leaveIconButton);
                leaveIconButton.addEventListener('click', function (event) {
                  event.preventDefault(); event.stopPropagation();
                  setTimeout(() => { openLeaveModal(calendar.view.currentStart, arg.resource); }, 0);
                });

                const dStr = ymd(calendar.view.currentStart);
                const isFB = Array.isArray(employeeLeaveData) && employeeLeaveData.some(l => l.date === dStr && l.resourceId === arg.resource.id && l.reason === '已約滿');
                const fbBtn = document.createElement('button');
                fbBtn.type = 'button';
                fbBtn.className = 'fully-booked-button' + (isFB ? ' fb-active' : '');
                fbBtn.dataset.resourceId = String(arg.resource.id);
                fbBtn.textContent = isFB ? '已約滿' : '約滿';
                btnGroup.appendChild(fbBtn);
                hostEl.appendChild(btnGroup);

                fbBtn.addEventListener('click', async (e) => {
                  e.stopPropagation();
                  const date = ymd(calendar.view.currentStart);
                  const resourceId = arg.resource.id;
                  try {
                    if (fbBtn.classList.contains('fb-active')) {
                      const res = await fetch(APPS_SCRIPT_WEB_APP_URL, { method: 'POST', mode: 'cors', body: JSON.stringify({ action: 'deleteLeave', resourceId, date }) });
                      const j = await res.json(); if (j.status !== 'success') throw new Error(j.message);
                      if (Array.isArray(employeeLeaveData)) {
                        const i = employeeLeaveData.findIndex(l => l.date === date && l.resourceId === resourceId && l.reason === '已約滿');
                        if (i !== -1) employeeLeaveData.splice(i, 1);
                      }
                      fbBtn.classList.remove('fb-active'); fbBtn.textContent = '約滿';
                    } else {
                      const res = await fetch(APPS_SCRIPT_WEB_APP_URL, { method: 'POST', mode: 'cors', body: JSON.stringify({ action: 'saveLeave', resourceId, date, reason: '已約滿' }) });
                      const j = await res.json(); if (j.status !== 'success') throw new Error(j.message);
                      if (Array.isArray(employeeLeaveData)) employeeLeaveData.push({ date, resourceId, reason: '已約滿' });
                      fbBtn.classList.add('fb-active'); fbBtn.textContent = '已約滿';
                    }
                    invalidateCache('getLeave');
                    paintEmployeeLeave(); syncFullyBookedButtons();
                  } catch (err) { alert('切換約滿失敗：' + err.message); }
                });
              },
              select: function (info) { openApptModalForCreate(info.start, info.resource); },
              eventContent: function (arg) {
                const ep = arg.event.extendedProps || {};
                const svcMap = {
                  '剪髮': ['剪'],
                  '染': ['染'],
                  '燙': ['燙'],
                  '染+燙': ['燙', '染'],
                  '頭皮護理': ['護'],
                  // 保留相容性
                  '剪+染': ['染'],
                  '剪+燙': ['燙'],
                  '剪+染+燙': ['染', '燙'],
                  '剪+頭皮護理': ['護']
                };
                if (ep.appointment_type === 'blocked') {
                  return { html: `<div class="fc-event-title evt-line evt-blocked"><span class="blocked-icon material-symbols-outlined" aria-hidden="true">pan_tool</span><span class="evt-col-note">${ep.notes ? ep.notes : ''}</span></div>` };
                }
                const svcList = svcMap[ep.service_id] || ['預'];
                const svcClassMap = { '剪': 'svc-cut', '染': 'svc-dye', '燙': 'svc-perm', '護': 'svc-treat', '預': 'svc-default' };
                const safeTrim = (v) => (v != null ? String(v).trim() : '');
                const name = safeTrim(ep.customer_name) || safeTrim(ep.notes);
                const phone = safeTrim(ep.customer_phone);
                const paidAmount = Number(ep.total_amount) || Number(ep.amount);  // 優先使用總金額，舊資料用入帳金額
                const isPaid = ep.appointment_type !== 'blocked' && !Number.isNaN(paidAmount) && paidAmount > 0;
                const currencyFormatter = new Intl.NumberFormat('zh-TW');

                // [修改] 結帳後顯示: 助理名字最後一字 + 金額
                let amountLabel = '';
                if (isPaid) {
                  const asst = ep.assistant_id || '';
                  const asstLast = safeTrim(asst).slice(-1);
                  amountLabel = (asstLast ? asstLast + ' ' : '') + '$' + currencyFormatter.format(paidAmount);
                }

                const badgeText = svcList.join('');
                const badgeKey = (svcList && svcList[0]) ? svcList[0] : '預';
                const badgeCls = svcClassMap[badgeKey] || 'svc-default';
                const servicesHtml = `<span class="evt-svc ${badgeCls}">${badgeText}</span>`;
                return { html: `<div class="fc-event-title evt-line"><span class="evt-col-svc"><span class="evt-services">${servicesHtml}</span></span><span class="evt-col-name">${name}</span><span class="evt-col-phone">${isPaid ? amountLabel : phone}</span></div>` };
              },
              eventClassNames: function (arg) {
                const r = arg.event.getResources();
                const cls = (r && r[0]) ? ['sty-' + r[0].id] : [];
                const ep = arg.event.extendedProps || {};
                if (ep.appointment_type === 'blocked') cls.push('blocked-time');
                const paidAmount = Number(ep.amount);
                if (ep.appointment_type !== 'blocked' && !Number.isNaN(paidAmount) && paidAmount > 0) cls.push('is-paid');
                return cls;
              },
            });
            calendar.render();
          }

          async function fetchAllCloudData() {
            try {
              const url = APPS_SCRIPT_WEB_APP_URL + '?action=getLeave';
              employeeLeaveData = await deduplicatedFetch(url);
              paintEmployeeLeave(); syncFullyBookedButtons();
            } catch (error) { console.error('讀取雲端資料失敗:', error); }
          }

          function syncFullyBookedButtons() {
            try {
              if (!calendar || !employeeLeaveData || calendar.view?.type !== 'resourceTimeGridDay') return;
              const dStr = ymd(calendar.view.currentStart);
              document.querySelectorAll('#calendar .fully-booked-button[data-resource-id]').forEach(btn => {
                const rid = btn.dataset.resourceId;
                const isFB = employeeLeaveData.some(l => l.date === dStr && String(l.resourceId) === String(rid) && l.reason === '已約滿');
                if (isFB) { btn.classList.add('fb-active'); btn.textContent = '已約滿'; } else { btn.classList.remove('fb-active'); btn.textContent = '約滿'; }
              });
            } catch (e) { }
          }

          function showToast(message, type = 'info', duration = 2000) {
            let container = document.getElementById('toast-container');
            if (!container) { container = document.createElement('div'); container.id = 'toast-container'; document.body.appendChild(container); }
            const toast = document.createElement('div');
            toast.className = `toast toast--${type}`; toast.textContent = message;
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.add('is-visible'));
            window.setTimeout(() => { toast.classList.remove('is-visible'); toast.addEventListener('transitionend', () => toast.remove(), { once: true }); }, duration);
          }

          function normalizePhone(value) {
            return String(value || '').replace(/\D/g, '').slice(0, 10);
          }

          function formatLastVisitLabel(rawStart) {
            if (!rawStart) return null;
            const normalized = String(rawStart || '').trim().replace(/\s+/g, 'T');
            const parsed = new Date(normalized);
            if (isNaN(parsed.getTime())) return String(rawStart).trim();
            const pad = v => String(v).padStart(2, '0');
            return `${parsed.getFullYear()}/${pad(parsed.getMonth() + 1)}/${pad(parsed.getDate())}`;
          }



          function updateLastVisitInfo(label, designerName) {
            const text = label ? `上次消費：${label}${designerName ? `（設計師：${designerName}）` : ''}` : '';
            if (lastVisitInfo) {
              lastVisitInfo.textContent = text;
              lastVisitInfo.hidden = !label;
            }
            if (lastVisitInfoRight) {
              lastVisitInfoRight.textContent = text;
              lastVisitInfoRight.hidden = !label;
            }
          }



          function removeEventOptimistically(eventId) {
            const ev = calendar.getEventById(String(eventId));
            if (!ev) return false;
            ev.remove(); return true;
          }

          function bindEventListeners() {
            phoneEl.addEventListener('input', async (e) => {
              let d = e.target.value.replace(/\D/g, '').slice(0, 10);
              if (d.length >= 7) e.target.value = d.replace(/^(\d{4})(\d{3})(\d{0,3}).*$/, (_, a, b, c) => c ? `${a}-${b}-${c}` : `${a}-${b}`);
              else if (d.length >= 5) e.target.value = d.replace(/^(\d{4})(\d{0,3}).*$/, '$1-$2');
              else e.target.value = d;

              // [警示名單] 當輸入滿 10 碼，檢查是否在警示名單中
              if (d.length === 10) {
                try {
                  const warnRes = await fetch(`${APPS_SCRIPT_WEB_APP_URL}?action=checkWarn&phone=${d}`, { method: 'GET', mode: 'cors' });
                  const warnData = await warnRes.json();
                  if (warnData && warnData.found) {
                    // 顯示警示橫幅
                    let banner = document.getElementById('warn-banner');
                    if (!banner) {
                      banner = document.createElement('div');
                      banner.id = 'warn-banner';
                      banner.className = 'warn-banner';
                      const phoneRow = phoneEl.closest('.form-row');
                      phoneRow.insertAdjacentElement('afterend', banner);
                    }
                    banner.innerHTML = `⚠ <strong>警示：</strong>${escapeHtml(warnData.note || '此客人列入警示名單')}`;
                    banner.style.display = 'block';
                  } else {
                    const banner = document.getElementById('warn-banner');
                    if (banner) banner.style.display = 'none';
                  }
                } catch (err) { console.error('警示名單查詢失敗:', err); }
              } else {
                const banner = document.getElementById('warn-banner');
                if (banner) banner.style.display = 'none';
              }

              // [CRM功能] 當輸入滿 10 碼且非編輯模式時，自動查詢歷史紀錄並追溯配方
              if (d.length === 10 && !eventIdInput.value) {
                try {
                  // 客戶端快取：同一電話在本次使用中只查一次 GAS
                  if (!window._crmCache) window._crmCache = {};
                  let history;
                  if (window._crmCache[d]) {
                    history = window._crmCache[d];
                  } else {
                    showToast('查詢歷史紀錄中...', 'loading', 5000);
                    const res = await fetch(`${APPS_SCRIPT_WEB_APP_URL}?action=getLastVisit&phone=${d}`, { method: 'GET', mode: 'cors' });
                    history = await res.json();
                    window._crmCache[d] = history;
                  }
                  if (history && history.customer_name) {
                    // 1. 自動填入姓名（若目前為空）
                    const nameInput = document.getElementById('customer_name');
                    if (nameInput && !nameInput.value.trim()) {
                      nameInput.value = history.customer_name;
                    }
                    // 2. 自動帶入染髮顏色並顯示區塊
                    if (history.dye_color) {
                      const dyeInput = document.getElementById('dye_color_input');
                      const dyeWrap = document.getElementById('dye-color-wrap');
                      if (dyeInput) dyeInput.value = history.dye_color;
                      if (dyeWrap) dyeWrap.style.display = 'grid'; // 強制顯示區塊
                    }
                    // 3. 嘗試匹配剪髮分類（依剪髮金額發亮提示，不自動勾選）
                    const histCut = parseInt(history.cut_price, 10);
                    const histAmt = parseInt(history.amount, 10);
                    if (Number.isFinite(histCut) && histCut > 0) {
                      const radios = document.querySelectorAll('input[name="cut_price"]');
                      radios.forEach(r => {
                        const item = r.closest('.price-item');
                        if (item) item.classList.remove('price-item--suggested'); // 清除舊狀
                        if (parseInt(r.value, 10) === histCut) {
                          if (item) item.classList.add('price-item--suggested');
                        }
                      });
                    } else if (Number.isFinite(histAmt) && histAmt > 0) {
                      const radios = document.querySelectorAll('input[name="cut_price"]');
                      radios.forEach(r => {
                        const item = r.closest('.price-item');
                        if (item) item.classList.remove('price-item--suggested'); // 清除舊狀
                        if (parseInt(r.value, 10) === histAmt) {
                          if (item) item.classList.add('price-item--suggested');
                        }
                      });
                    }
                    // 4. 自動填入上次消費資訊到備註（若備註為空）
                    const notesInput = document.getElementById('notes');
                    if (notesInput && !notesInput.value.trim()) {
                      const lastDate = formatLastVisitLabel(history.start);
                      const lastSvc = history.service_id || '';
                      const lastDesigner = getDesignerNameById(history.employee_id);
                      if (lastDate) {
                        const parts = [`上次：${lastDate}`];
                        if (lastDesigner) parts.push(lastDesigner);
                        if (lastSvc) parts.push(lastSvc);
                        if (history.dye_color) parts.push(`色號:${history.dye_color}`);
                        notesInput.value = parts.join(' / ');
                      }
                    }

                    const lastVisitLabel = formatLastVisitLabel(history.start);
                    if (lastVisitLabel) {
                      lastVisitLabelValue = lastVisitLabel;
                      lastVisitPhoneValue = normalizePhone(history.customer_phone || d);
                      lastVisitDesignerValue = getDesignerNameById(history.employee_id);
                      updateLastVisitInfo(lastVisitLabel, lastVisitDesignerValue);
                    }
                    showToast('已找到歷史紀錄並帶入', 'success', 2000);
                  }
                } catch (err) { console.error('CRM查詢失敗:', err); }
              }
            });

            notesTextarea.addEventListener('input', () => document.querySelector('.notes-meta span').textContent = '未儲存');
            document.getElementById('save-notes-btn').addEventListener('click', async () => {
              const meta = document.querySelector('.notes-meta span'); meta.textContent = '儲存中...';
              try {
                await fetch(APPS_SCRIPT_WEB_APP_URL, { method: 'POST', mode: 'cors', body: JSON.stringify({ action: 'saveNotes', date: currentYmd || ymd(new Date()), content: notesTextarea.value }) });
                invalidateCache('getNotes'); meta.textContent = '已儲存 ✓';
              } catch (e) { meta.textContent = '儲存失敗 ❌'; }
            });

            leaveForm.addEventListener('submit', async (e) => {
              e.preventDefault();
              try {
                const res = await fetch(APPS_SCRIPT_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'saveLeave', resourceId: document.getElementById('leaveResourceId').value, date: document.getElementById('leaveDate').value, reason: document.getElementById('leaveReason').value.trim() || '排休' }), mode: 'cors' });
                const r = await res.json(); if (r.status !== 'success') throw new Error(r.message);
                invalidateCache('getLeave'); invalidateCache('getEvents');
                calendar.refetchEvents(); leaveModal.style.display = 'none'; fetchAllCloudData();
              } catch (err) { alert('儲存排休失敗: ' + err.message); }
            });

            deleteLeaveBtn.addEventListener('click', async () => {
              if (!confirm('確定要取消這筆排休嗎？')) return;
              try {
                await fetch(APPS_SCRIPT_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteLeave', resourceId: document.getElementById('leaveResourceId').value, date: document.getElementById('leaveDate').value }), mode: 'cors' });
                invalidateCache('getLeave'); invalidateCache('getEvents');
                calendar.refetchEvents(); leaveModal.style.display = 'none'; fetchAllCloudData();
              } catch (err) { alert('刪除排休失敗: ' + err.message); }
            });

            form.addEventListener('submit', async (e) => {
              e.preventDefault();
              const isEditing = !!eventIdInput.value;
              const fd = new FormData(form);
              const amountRaw = fd.get('amount_input');
              const parsedAmount = parseInt(amountRaw, 10);
              const amountValue = Number.isFinite(parsedAmount) ? String(Math.max(0, parsedAmount)) : '';

              // 確保總金額計算最新
              updateCalculatedTotal();

              const payload = {
                action: isEditing ? 'edit' : 'create',
                id: fd.get('event_id') || undefined,
                employee_id: fd.get('employee_id'),
                start: fd.get('start_time'),
                appointment_type: fd.get('appointment_type'),
                customer_name: fd.get('customer_name') || '',
                customer_phone: (fd.get('customer_phone') || '').replace(/\D/g, ''),
                service_id: fd.get('service_id') || '',
                assistant_id: fd.get('assistant_select') || '',
                cut_price: (document.querySelector('input[name="cut_price"]:checked')?.value) || '',
                amount: amountValue,
                total_amount: window.displayTotal,  // 新增總金額欄位
                notes: fd.get('notes') || '',

          function updateCalculatedTotal() {
            let cutPrice = 0;
            let chemTotal = 0;
            let totalCost = 0;

            let chemTriggerActive = false;
            let defaultChemCost = 0;

            const cut = document.querySelector('input[name="cut_price"]:checked');
            if (cut) {
              cutPrice = parseInt(cut.value, 10) || 0;
              totalCost += parseInt(cut.dataset.cost || 0, 10);
            }
            // [新增] 剪髮自訂
            cutPrice += (parseInt(document.getElementById('cut_custom').value, 10) || 0);

            document.querySelectorAll('input[name="other_item"]:checked').forEach(item => {
              const p = parseInt(item.value, 10) || 0;
              let c = parseInt(item.dataset.cost || 0, 10) || 0;
              const label = item.parentElement.textContent.trim();

              if (label.includes('漂4000')) {
                chemTriggerActive = true;
                defaultChemCost += c; // 累計漂4000的預設成本
              } else {
                totalCost += c; // 染髮、洗髮或其他
              }
              chemTotal += p;
            });
            // [新增] 其他自訂
            const oc = (parseInt(document.getElementById('other_custom').value, 10) || 0);
            if (oc > 0) chemTriggerActive = true;
            chemTotal += oc;

            const permRadio = document.querySelector('input[name="perm_price"]:checked');
            let permPrice = 0;
            if (permRadio) {
              permPrice = parseInt(permRadio.value, 10) || 0;
              totalCost += parseInt(permRadio.dataset.cost || 0, 10) || 0;
            }
            // [新增] 燙髮自訂
            const pc = (parseInt(document.getElementById('perm_custom').value, 10) || 0);
            if (pc > 0) chemTriggerActive = true;
            permPrice += pc;

            // 處理統一材料費
            const customMaterialVal = parseInt(document.getElementById('custom_material_cost').value, 10) || 0;
            if (chemTriggerActive) {
              if (customMaterialVal > 0) totalCost += customMaterialVal;
              else totalCost += defaultChemCost;
            }

            const retailInput = document.getElementById('retail_price');
            let retailVal = parseInt(retailInput?.value, 10) || 0;

            const displayTotal = cutPrice + chemTotal + permPrice + retailVal;
            const netAmount = displayTotal - totalCost;

            document.getElementById('display-total').textContent = '$' + displayTotal;
            document.getElementById('display-net').textContent = '$' + netAmount;
            const finalAmount = netAmount > 0 ? netAmount : '';
            document.getElementById('amount_input').value = finalAmount;

            // 更新全域 displayTotal
            window.displayTotal = displayTotal;

            if (unsetPaidBtn && eventIdInput.value) {
              const show = !document.querySelector('input[name="appointment_type"][value="blocked"]').checked && Number.isFinite(netAmount) && netAmount > 0;
              unsetPaidBtn.style.display = show ? 'inline-flex' : 'none';
            }
          }

          function toTaipeiIsoForApi(dateObj) {
            const dt = dateObj instanceof Date ? dateObj : new Date(dateObj);
            if (isNaN(dt.getTime())) return '';
            const parts = new Intl.DateTimeFormat('sv-SE', {
              timeZone: 'Asia/Taipei',
              year: 'numeric',
              month: '2-digit',
              day: '2-digit',
              hour: '2-digit',
              minute: '2-digit',
              second: '2-digit',
              hour12: false
            }).formatToParts(dt).reduce((acc, p) => {
              acc[p.type] = p.value;
              return acc;
            }, {});
            return `${parts.year}-${parts.month}-${parts.day}T${parts.hour}:${parts.minute}:${parts.second}+08:00`;
          }

          function updateHiddenStartTime(baseDate) {
            const selectedMinute = parseInt(document.getElementById('minute_select').value, 10);
            const dt = new Date(baseDate.getTime());
            dt.setMinutes(selectedMinute, 0, 0);
            document.getElementById('start_time').value = toTaipeiIsoForApi(dt);
          }

          function renderPerResourceTimeAxis() {
            document.querySelectorAll('#calendar .per-resource-time-axis').forEach(n => n.remove());
            if (!calendar || calendar.view?.type !== 'resourceTimeGridDay') return;
            resetCalendarHorizontalScroll();
            const laneCells = Array.from(document.querySelectorAll('#calendar .fc-resourceTimeGridDay-view td.fc-timegrid-slot.fc-timegrid-slot-lane[data-time]'));
            if (!laneCells.length) return;
            const byTime = new Map();
            laneCells.forEach(cell => { const t = cell.getAttribute('data-time'); if (!byTime.has(t)) byTime.set(t, cell); });
            const labelInfos = Array.from(byTime.entries()).sort((a, b) => (a[0] < b[0] ? -1 : a[0] > b[0] ? 1 : 0)).map(([t, cell]) => {
              const text = String(t).slice(0, 5); const rect = cell.getBoundingClientRect(); const minute = parseInt(String(t).slice(3, 5), 10);
              return { text, rect, kind: (minute === 0 || minute === 30 ? 'major' : 'minor') };
            });
            const frames = Array.from(document.querySelectorAll('#calendar .fc-resourceTimeGridDay-view .fc-timegrid-col[data-resource-id] .fc-timegrid-col-frame'));
            frames.forEach(frame => {
              const axis = document.createElement('div'); axis.className = 'per-resource-time-axis';
              const frameRect = frame.getBoundingClientRect();
              labelInfos.forEach(info => {
                const item = document.createElement('div'); item.className = `per-resource-time-item ${info.kind === 'major' ? 'is-major' : 'is-minor'}`;
                item.textContent = info.text; item.style.top = `${info.rect.top - frameRect.top + info.rect.height / 2}px`;
                axis.appendChild(item);
              });
              frame.appendChild(axis);
            });
          }

          function updateDateScroller(info) {

              activeDate = new Date(info.view.currentStart);

            if (!activeDate) {

            activeDate.setHours(12, 0, 0, 0);
            const dateLocale = 'zh-TW';
            const monthRaw = new Intl.DateTimeFormat(dateLocale, { month: 'numeric' }).format(activeDate);

            // 更新顯示（月視圖僅顯示 年/月，不顯示日）

            if (activeBase.getDay() === 1) activeBase.setDate(activeBase.getDate() + 1);
            const before = []; const after = [];
            let cursor = new Date(activeBase);
            while (before.length < 10) { cursor.setDate(cursor.getDate() - 1); if (cursor.getDay() === 1) continue; before.push(new Date(cursor)); }
            cursor = new Date(activeBase);
            while (after.length < 10) { cursor.setDate(cursor.getDate() + 1); if (cursor.getDay() === 1) continue; after.push(new Date(cursor)); }
            dates.push(...before.reverse(), activeBase, ...after);

            strip.innerHTML = '';

                console.log('date-item pointerdown', btn.dataset.date);

              btn.addEventListener('touchstart', (e) => {

                console.log('date-item touchstart', btn.dataset.date);

        function escapeHtml(value) {
          return String(value == null ? '' : value).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        function formatLookupDate(dateLike) {
          const raw = (dateLike instanceof Date) ? dateLike : String(dateLike || '').trim();
          if (!raw) return '';
          const parsed = new Date(raw);
          if (isNaN(parsed.getTime())) return '';

          const datePart = new Intl.DateTimeFormat('zh-TW', {
            timeZone: 'Asia/Taipei',
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            weekday: 'short'
          }).format(parsed);
          const timePart = new Intl.DateTimeFormat('zh-TW', {
            timeZone: 'Asia/Taipei',
            hour: '2-digit',
            minute: '2-digit',
            hour12: false
          }).format(parsed);
          return `${datePart} ${timePart}`;
        }

        function formatLookupDateByEvent(ev) {
          if (calendar && ev && ev.id != null) {
            const fcEv = calendar.getEventById(String(ev.id));
            if (fcEv && fcEv.start instanceof Date) {
              return formatLookupDate(fcEv.start);
            }
          }
          return formatLookupDate(ev ? ev.start : '');
        }

        function getLookupDesignerName(ev) {
          const ep = (ev && ev.extendedProps) ? ev.extendedProps : {};
          const rid = String((ev && ev.resourceId) || ep.employee_id || '').trim();
          return getDesignerNameById(rid) || rid || '未指定';
        }

        function renderLookupResult(events, phoneQuery, nameQuery) {

            return;
          }

          const now = Date.now();
          const items = events.map(ev => {
            const startTs = new Date(ev.start).getTime();
            return { ev, startTs, isPast: Number.isFinite(startTs) && startTs < now };
          });
          // items.sort((a, b) => (a.startTs || 0) - (b.startTs || 0)); // Old sort: ascending
          items.sort((a, b) => (b.startTs || 0) - (a.startTs || 0)); // New sort: descending (newest first)

          const finalList = items; // Show all items
          const headline = `\u5171 ${events.length} \u7B46\uFF0C\u986F\u793A ${finalList.length} \u7B46\uFF08\u6309\u6642\u9593\u5012\u5E8F\uFF09`;
          const keywordText = `\u95DC\u9375\u5B57\uFF1A${phoneQuery ? `\u96FB\u8A71 ${phoneQuery}` : ''}${phoneQuery && nameQuery ? ' / ' : ''}${nameQuery ? `\u59D3\u540D ${nameQuery}` : ''}`;
          const rows = finalList.map(({ ev, isPast }) => {

        async function runLookupSearch() {
          if (!lookupResult) return;
          const phoneDigits = String(lookupPhone?.value || '').replace(/\D/g, '');
          if (!phoneDigits) {
            lookupResult.innerHTML = '<div class="lookup-empty">\u8ACB\u8F38\u5165\u96FB\u8A71</div>';
            return;
          }

          lookupResult.innerHTML = '<div style="text-align:center; padding:16px;">\u8CC7\u6599\u67E5\u8A62\u4E2D...</div>';
          const phoneMatch = (value) => {
            const d = String(value || '').replace(/\D/g, '');
            if (!d) return false;
            return d.includes(phoneDigits) || phoneDigits.includes(d);
          };
          let searchErr = null;
          try {
            const params = new URLSearchParams({
              action: 'searchAppointments',
              includePast: '1',
              limit: '120'
            });
            params.set('phone', phoneDigits);
            const res = await fetch(APPS_SCRIPT_WEB_APP_URL + '?' + params.toString(), { method: 'GET', mode: 'cors' });
            const raw = await res.json();
            if (!Array.isArray(raw) && raw && raw.status === 'error') {
              throw new Error(raw.message || 'searchAppointments failed');
            }
            const events = Array.isArray(raw) ? raw : (Array.isArray(raw?.events) ? raw.events : []);
            renderLookupResultSafely(events, phoneDigits, '');
            return;
          } catch (err) {
            searchErr = err;
            console.error('searchAppointments failed:', err);
            try {
              const r2 = await fetch(APPS_SCRIPT_WEB_APP_URL + '?action=getEvents', { method: 'GET', mode: 'cors' });
              const all = await r2.json();
              const events = Array.isArray(all) ? all.filter(ev => {
                const ep = ev.extendedProps || {};
                if (String(ep.appointment_type || '').toLowerCase() === 'blocked') return false;
                return phoneMatch(ep.customer_phone);
              }) : [];
              renderLookupResultSafely(events, phoneDigits, '');
            } catch (err2) {
              console.error('lookup fallback getEvents failed:', err2);
              lookupResult.innerHTML = '<div class="lookup-empty">\u67E5\u8A62\u5931\u6557\uFF0C\u8ACB\u7A0D\u5F8C\u518D\u8A66</div>';
            }
          }
        }

          if (!repStart.value) repStart.value = `${now.getFullYear()}-${pad2(now.getMonth() + 1)}-01`;
          if (!repEnd.value) repEnd.value = `${now.getFullYear()}-${pad2(now.getMonth() + 1)}-${pad2(now.getDate())}`;
        }
        if (openReportBtn) openReportBtn.addEventListener('click', () => { reportModal.style.display = 'block'; initReportDateRange(); });
        if (closeReportBtn) closeReportBtn.addEventListener('click', () => reportModal.style.display = 'none');
        if (openLookupBtn) openLookupBtn.addEventListener('click', () => {
          if (!lookupModal) lookupModal = document.getElementById('lookupModal');
          if (lookupModal) lookupModal.style.display = 'block';
          if (lookupResult) lookupResult.innerHTML = '<div style="text-align:center; color:var(--md3-on-surface-variant); padding:20px;">\u8ACB\u8F38\u5165\u96FB\u8A71\u5F8C\u67E5\u8A62</div>';
          if (lookupName) lookupName.value = '';
          if (lookupPhone) {
            lookupPhone.value = '';
            lookupPhone.focus();
          }
        });
        if (closeLookupBtn) closeLookupBtn.addEventListener('click', () => { if (lookupModal) lookupModal.style.display = 'none'; });
        if (fetchLookupBtn) fetchLookupBtn.addEventListener('click', runLookupSearch);
        [lookupPhone, lookupName].forEach(el => {
          if (!el) return;
          el.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
              e.preventDefault();
              runLookupSearch();
            }
          });
        });
        if (lookupPhone) {
          lookupPhone.addEventListener('input', (e) => {
            let d = String(e.target.value || '').replace(/\D/g, '').slice(0, 10);
            if (d.length >= 7) e.target.value = d.replace(/^(\d{4})(\d{3})(\d{0,3}).*$/, (_, a, b, c) => c ? `${a}-${b}-${c}` : `${a}-${b}`);
            else if (d.length >= 5) e.target.value = d.replace(/^(\d{4})(\d{0,3}).*$/, '$1-$2');
            else e.target.value = d;
          });
        }
        if (fetchReportBtn) fetchReportBtn.addEventListener('click', async () => {
          const start = repStart.value; const end = repEnd.value;
          if (!start || !end) { reportResult.innerHTML = '<div style="color:var(--md3-error); text-align:center;">請選擇起訖日期</div>'; return; }
          reportResult.innerHTML = '<div style="text-align:center;">⏳ 資料計算中...</div>';
          try {
            const res = await fetch(APPS_SCRIPT_WEB_APP_URL + `?action=getReport&startDate=${encodeURIComponent(start)}&endDate=${encodeURIComponent(end)}`);
            renderReport(await res.json());
          } catch (e) { reportResult.innerHTML = '<div style="color:var(--md3-error); text-align:center;">❌ 讀取失敗</div>'; }
        });

        function renderReport(data) {
          if (!data || (!Object.keys(data.designers).length && !Object.keys(data.assistants).length)) {
            reportResult.innerHTML = '<div style="text-align:center; padding:20px; color:var(--md3-on-surface-variant);">該區間尚無預約資料</div>'; return;
          }
          let html = '';
          html += `<h4 style="margin-top:0; border-left:4px solid var(--md3-primary); padding-left:10px;">設計師業績 (40%)</h4>`;
          html += `<table class="report-table" style="margin-bottom:20px;"><thead><tr><th width="18%">設計師</th><th width="10%">客數</th><th width="9%">剪</th><th width="9%">燙</th><th width="9%">染</th><th width="22%">總金額</th><th width="23%">業績抽成</th></tr></thead><tbody>`;
          const designerMap = { '1': '店長', '2': '雅婷', '3': '小白' };
          for (const [id, info] of Object.entries(data.designers)) {
            const commission = Math.round((info.totalAmount || 0) * 0.4);
            html += `<tr><td style="text-align:center; font-weight:bold;">${designerMap[id] || id}</td><td class="num-cell">${info.count || 0}</td><td class="num-cell">${info.cutCount || info.count || 0}</td><td class="num-cell">${info.permCount || 0}</td><td class="num-cell">${info.dyeCount || 0}</td><td class="num-cell">$${(info.totalAmount || 0).toLocaleString()}</td><td class="num-cell" style="color:var(--md3-primary); font-weight:bold;">$${commission.toLocaleString()}</td></tr>`;
          }
          html += `</tbody></table>`;
          html += `<h4 style="margin-top:0; border-left:4px solid #e65100; padding-left:10px;">助理洗頭業績 (超過300顆, 每顆$20)</h4>`;
          html += `<table class="report-table"><thead><tr><th width="30%">助理姓名</th><th width="30%">洗頭數</th><th width="40%">業績獎金</th></tr></thead><tbody>`;
          for (const [name, info] of Object.entries(data.assistants)) {
            if (!name || name === 'undefined') continue;
            const excess = Math.max(0, (info.washCount || 0) - 300);
            html += `<tr><td style="text-align:center; font-weight:bold;">${name}</td><td class="num-cell">${info.washCount || 0} <span style="font-size:0.8em; color:var(--md3-on-surface-variant);">(超額 ${excess})</span></td><td class="num-cell" style="color:#e65100; font-weight:bold;">$${(excess * 20).toLocaleString()}</td></tr>`;
          }
          html += `</tbody></table>`;
          reportResult.innerHTML = html;
        }
      })();

      // ====== 警示名單管理 ======
      (function () {
        const openBtn = document.getElementById('open-warnlist-btn');
        const modal = document.getElementById('warnlistModal');
        const closeBtn = document.querySelector('.warnlist-close-button');
        const addBtn = document.getElementById('warn-add-btn');
        const phoneInput = document.getElementById('warn-phone');
        const noteInput = document.getElementById('warn-note');
        const listContainer = document.getElementById('warnlist-items');

        async function loadWarnList() {
          listContainer.innerHTML = '<div style="text-align:center; color:var(--md3-on-surface-variant); padding:12px;">載入中...</div>';
          try {
            const res = await fetch(APPS_SCRIPT_WEB_APP_URL + '?action=getWarnList', { method: 'GET', mode: 'cors' });
            const data = await res.json();
            if (!data || !data.list || data.list.length === 0) {
              listContainer.innerHTML = '<div style="text-align:center; color:var(--md3-on-surface-variant); padding:12px;">目前沒有警示名單</div>';
              return;
            }
            listContainer.innerHTML = data.list.map(item => `
              <div class="warnlist-item">
                <div class="warnlist-item-info">
                  <span class="warnlist-phone">${escapeHtml(item.phone)}</span>
                  <span class="warnlist-note">${escapeHtml(item.note || '')}</span>
                </div>
                <button type="button" class="warnlist-delete-btn" data-phone="${escapeHtml(item.phone)}">刪除</button>
              </div>
            `).join('');
            listContainer.querySelectorAll('.warnlist-delete-btn').forEach(btn => {
              btn.addEventListener('click', async function () {
                const phone = this.dataset.phone;
                if (!confirm(`確定要從警示名單移除 ${phone} 嗎？`)) return;
                try {
                  await fetch(APPS_SCRIPT_WEB_APP_URL, { method: 'POST', mode: 'cors', body: JSON.stringify({ action: 'deleteWarn', phone }) });
                  loadWarnList();
                } catch (err) { alert('刪除失敗: ' + err.message); }
              });
            });
          } catch (err) {
            listContainer.innerHTML = '<div style="text-align:center; color:#ff5252; padding:12px;">載入失敗</div>';
          }
        }

        if (openBtn) openBtn.addEventListener('click', () => {
          modal.style.display = 'block';
          loadWarnList();
        });

        if (addBtn) addBtn.addEventListener('click', async () => {
          const phone = (phoneInput.value || '').replace(/\D/g, '');
          const note = noteInput.value.trim();
          if (!phone || phone.length < 9) { alert('請輸入正確的電話號碼'); return; }
          if (!note) { alert('請輸入備註'); return; }
          try {
            addBtn.disabled = true;
            addBtn.textContent = '儲存中...';
            const res = await fetch(APPS_SCRIPT_WEB_APP_URL, { method: 'POST', mode: 'cors', body: JSON.stringify({ action: 'addWarn', phone, note }) });
            const result = await res.json();
            if (result.status === 'success') {
              phoneInput.value = ''; noteInput.value = '';
              showToast('已新增至警示名單', 'success', 2000);
              loadWarnList();
            } else {
              alert('新增失敗: ' + (result.message || '未知錯誤'));
            }
          } catch (err) { alert('新增失敗: ' + err.message); }
          finally { addBtn.disabled = false; addBtn.textContent = '新增'; }
        });

        // 電話輸入格式化
        if (phoneInput) phoneInput.addEventListener('input', (e) => {
          let d = String(e.target.value || '').replace(/\D/g, '').slice(0, 10);
          if (d.length >= 7) e.target.value = d.replace(/^(\d{4})(\d{3})(\d{0,3}).*$/, (_, a, b, c) => c ? `${a}-${b}-${c}` : `${a}-${b}`);
          else if (d.length >= 5) e.target.value = d.replace(/^(\d{4})(\d{0,3}).*$/, '$1-$2');
          else e.target.value = d;
        });
      })();
    </script>
</body>

</html>
