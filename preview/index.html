  <script>
    // 主題色：開頁立即套用使用者自訂色（存在 localStorage），避免換色閃爍。
    // 這份設定是「可在網頁上自訂的色票」的唯一來源，三處共用。
    window.THEME_COLOR_KEYS = [
      { key: 'theme-paper',     var: '--paper',      label: '頁面底色' },
      { key: 'theme-designer1', var: '--designer-1', label: '店長' },
      { key: 'theme-designer2', var: '--designer-2', label: '雅婷' },
      { key: 'theme-designer3', var: '--designer-3', label: '小白' },
      { key: 'theme-paid',      var: '--paid',       label: '結帳卡片' }
    ];
    // 可調「推導參數」（數字%，用滑桿）：值含單位字串(如 "24%")，存 localStorage
    window.THEME_PARAM_KEYS = [
      { key: 'theme-col-alpha',  var: '--resource-col-alpha', label: '欄底濃度',     min: 0, max: 60, step: 2, unit: '%' },
      { key: 'theme-appt-alpha', var: '--appt-alpha',         label: '預約卡片濃度', min: 0, max: 100, step: 2, unit: '%' }
    ];
    try {
      window.THEME_COLOR_KEYS.forEach(function (c) {
        var v = localStorage.getItem(c.key);
        if (v) document.documentElement.style.setProperty(c.var, v);
      });
      window.THEME_PARAM_KEYS.forEach(function (p) {
        var v = localStorage.getItem(p.key);
        if (v) document.documentElement.style.setProperty(p.var, v);
      });
    } catch (e) {}
  </script>

  <script>
    // 報頭日期:預設今天,行事曆切日期時由 datesSet 呼叫同步
    function updateMastheadDate(d) {
      document.getElementById('mh-year').textContent = d.getFullYear();
      document.getElementById('mh-month').textContent = String(d.getMonth() + 1).padStart(2, '0') + '.';
      document.getElementById('mh-day').textContent = String(d.getDate()).padStart(2, '0');
      document.getElementById('mh-week').textContent = '星期' + '日一二三四五六'[d.getDay()];
    }
    updateMastheadDate(new Date());
  </script>
  <script>
    // 排休/約滿鈕：點設計師名字（黑塊）展開，點按鈕或空白處收回。
    // 用 capture 階段委派，不受既有按鈕 handler 的 stopPropagation 影響，也不動既有 JS。
    (function () {
      document.addEventListener('click', function (e) {
        var closeAll = function (except) {
          document.querySelectorAll('.fc-col-header-cell-cushion.show-actions').forEach(function (c) {
            if (c !== except) c.classList.remove('show-actions');
          });
        };
        var name = e.target.closest && e.target.closest('.wt-t8 b');
        if (name) {
          var cushion = name.closest('.fc-col-header-cell-cushion');
          closeAll(cushion);
          if (cushion) cushion.classList.toggle('show-actions');
          return;
        }
        var btn = e.target.closest && e.target.closest('.leave-icon-button, .fully-booked-button');
        if (btn) {
          var c = btn.closest('.fc-col-header-cell-cushion');
          if (c) setTimeout(function () { c.classList.remove('show-actions'); }, 0);
          return;
        }
        closeAll(null);
      }, true);
    })();
  </script>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.5/main.min.js"></script>

    <script>
      // 後端 Google Apps Script 網址
      const APPS_SCRIPT_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyICaHAciRLstbnMvKLxkCopi7oxblP4goUSD8yj2CI6SmugltRcQOwTeBBiHS99VzW2Q/exec';

      // 全域 escapeHtml（防 XSS）
      function escapeHtml(value) {
        return String(value == null ? '' : value).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
      }
      // 全域 showToast（跨 IIFE 共用）
      function showToast(message, type = 'info', duration = 2000) {
        let container = document.getElementById('toast-container');
        if (!container) { container = document.createElement('div'); container.id = 'toast-container'; document.body.appendChild(container); }
        const toast = document.createElement('div');
        toast.className = `toast toast--${type}`; toast.textContent = message;
        container.appendChild(toast);
        requestAnimationFrame(() => toast.classList.add('is-visible'));
        window.setTimeout(() => { toast.classList.remove('is-visible'); toast.addEventListener('transitionend', () => toast.remove(), { once: true }); }, duration);
      }
      const RESOURCE_LIST = [
        { id: '1', title: '店長' },
        { id: '2', title: '雅婷' },
        { id: '3', title: '小白' }
      ];
      const DESIGNER_NAME_BY_ID = {
        '1': '店長',
        '2': '雅婷',
        '3': '小白'
      };
      const MOBILE_RESOURCE_STORAGE_KEY = 'sj_mobile_resource_id';
      const MOBILE_RESOURCE_MEDIA_QUERY = '(max-width: 480px)';

      (function () {
        function getDesignerNameById(id) {
          const rid = String(id || '').trim();
          if (!rid) return '';
          if (DESIGNER_NAME_BY_ID[rid]) return DESIGNER_NAME_BY_ID[rid];
          const res = Array.isArray(RESOURCE_LIST) ? RESOURCE_LIST.find(r => String(r.id) === rid) : null;
          return res ? res.title : '';
        }
        let employeeLeaveData = [];
        const ymd = d => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        // 該設計師該日是否已約滿(存在 employeeLeaveData, reason='已約滿')
        const isFullyBooked = (dateStr, resourceId) => Array.isArray(employeeLeaveData) &&
          employeeLeaveData.some(l => l.date === dateStr && String(l.resourceId) === String(resourceId) && l.reason === '已約滿');
        let currentYmd = null;
        let selectedDate = null;
        let calendar;
        let perResourceAxisTimer = null;
        let mobileSelectedResourceId = null;
        let displayTotal = 0;  // 全域變數儲存總金額

        let appointmentModal, leaveModal, reportModal, lookupModal, warnlistModal;
        let appointmentCloseButton, leaveCloseButton, reportCloseButton, lookupCloseButton, warnlistCloseButton;
        let form, leaveForm, notesTextarea, phoneEl, customerFields;
        let submitBtn, deleteBtn, eventIdInput, operatorSelect, assistantSelect, amountInput, deleteLeaveBtn, unsetPaidBtn;
        let appointmentContent, appointmentActions, appointmentActionsAnchor, appointmentInfoCard;
        let lastVisitInfo;
        let lastVisitInfoRight;
        let lastVisitLabelValue = '';
        let lastVisitPhoneValue = '';
        let lastVisitDesignerValue = '';

        /* ====== API 請求優化：debounce + cache ====== */
        function debounce(fn, ms) {
          let timer;
          return function (...args) { clearTimeout(timer); timer = setTimeout(() => fn.apply(this, args), ms); };
        }

        /* 簡易快取：key → { data, ts }，預設 5 分鐘 */
        const _apiCache = {};
        const API_CACHE_TTL = 5 * 60 * 1000;
        const PERSISTENT_EVENT_CACHE_PREFIX = 'sj_api_cache_v1:';
        const PERSISTENT_EVENT_CACHE_TTL = 12 * 60 * 60 * 1000;

        function isPersistentEventUrl(url) {
          return String(url || '').includes('action=getEvents');
        }

        function apiCacheKey(url) {
          if (!isPersistentEventUrl(url)) return url;
          return APPS_SCRIPT_WEB_APP_URL + '?action=getEvents';
        }

        function persistentEventCacheKey(url) {
          return PERSISTENT_EVENT_CACHE_PREFIX + encodeURIComponent(apiCacheKey(url));
        }

        function getFreshMemoryCache(url, ttl = API_CACHE_TTL) {
          const cached = _apiCache[apiCacheKey(url)];
          return cached && (Date.now() - cached.ts) < ttl ? cached.data : null;
        }

        function readPersistentEventCache(url, ttl = PERSISTENT_EVENT_CACHE_TTL) {
          if (!isPersistentEventUrl(url)) return null;
          try {
            const raw = localStorage.getItem(persistentEventCacheKey(url));
            if (!raw) return null;
            const cached = JSON.parse(raw);
            if (!cached || (Date.now() - cached.ts) >= ttl) return null;
            return cached.data;
          } catch (e) {
            return null;
          }
        }

        function writePersistentEventCache(url, data) {
          if (!isPersistentEventUrl(url) || !Array.isArray(data)) return;
          try {
            localStorage.setItem(persistentEventCacheKey(url), JSON.stringify({ data, ts: Date.now() }));
          } catch (e) {
            console.warn('寫入事件快取失敗:', e);
          }
        }

        function removePersistentEventCache(keyword) {
          try {
            for (let i = localStorage.length - 1; i >= 0; i--) {
              const key = localStorage.key(i);
              if (!key || !key.startsWith(PERSISTENT_EVENT_CACHE_PREFIX)) continue;
              const url = decodeURIComponent(key.slice(PERSISTENT_EVENT_CACHE_PREFIX.length));
              if (!keyword || url.includes(keyword)) localStorage.removeItem(key);
            }
          } catch (e) {
            console.warn('清除事件快取失敗:', e);
          }
        }

        function wait(ms) {
          return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function parseJsonResponse(response, url) {
          const text = await response.text();
          const trimmed = text.trim();
          if (!response.ok) {
            throw new Error(`API HTTP ${response.status}: ${trimmed.slice(0, 120)}`);
          }
          if (!trimmed) return null;
          if (trimmed[0] === '<') {
            throw new Error(`API 回傳 HTML，不是 JSON: ${url}`);
          }
          try {
            return JSON.parse(text);
          } catch (error) {
            throw new Error(`API JSON 解析失敗: ${error.message}`);
          }
        }

        async function fetchFreshJson(url, retryCount = 2) {
          let lastError;
          for (let attempt = 0; attempt <= retryCount; attempt++) {
            try {
              const response = await fetch(url, { method: 'GET', mode: 'cors' });
              const data = await parseJsonResponse(response, url);
              _apiCache[apiCacheKey(url)] = { data, ts: Date.now() };
              writePersistentEventCache(url, data);
              return data;
            } catch (error) {
              lastError = error;
              if (attempt < retryCount) await wait(600 * (attempt + 1));
            }
          }
          throw lastError;
        }

        function cachedFetch(url, ttl = API_CACHE_TTL) {
          const cached = getFreshMemoryCache(url, ttl);
          if (cached) return Promise.resolve(cached);
          return fetchFreshJson(url);
        }
        /* 寫入操作後，清除相關快取 */
        function invalidateCache(keyword) {
          Object.keys(_apiCache).forEach(k => { if (k.includes(keyword)) delete _apiCache[k]; });
          removePersistentEventCache(keyword);
        }

        /* 防止同一個 action 重複併發：回傳進行中的 Promise */
        const _inflightRequests = {};
        function deduplicatedFetch(url) {
          if (_inflightRequests[url]) return _inflightRequests[url];
          _inflightRequests[url] = cachedFetch(url).finally(() => { delete _inflightRequests[url]; });
          return _inflightRequests[url];
        }

        function deliverEventsAsync(successCallback, data) {
          Promise.resolve().then(() => {
            successCallback(Array.isArray(data) ? data : []);
          });
        }

        function filterEventsForRange(events, startDate, endDate) {
          if (!Array.isArray(events)) return [];
          const rangeStart = startDate ? startDate.getTime() : -Infinity;
          const rangeEnd = endDate ? endDate.getTime() : Infinity;
          return events.filter(event => {
            const eventStart = new Date(event.start).getTime();
            const eventEnd = event.end ? new Date(event.end).getTime() : eventStart;
            if (!Number.isFinite(eventStart)) return false;
            return eventStart < rangeEnd && eventEnd >= rangeStart;
          });
        }

        /* 主題已統一為單一預設樣式；清除舊版三態切換殘留 */
        try { localStorage.removeItem('modal-theme'); } catch (e) {}

        /* 自訂金額 focus 時全選，方便直接覆蓋輸入 */
        document.addEventListener('focusin', function (e) {
          if (e.target.classList.contains('custom-price-input')) e.target.select();
        });
        /* 自訂金額 blur 時，空值歸零 */
        document.addEventListener('focusout', function (e) {
          if (e.target.classList.contains('custom-price-input') && !e.target.value) e.target.value = '0';
        });

        const CUSTOM_PRICE_FIELDS = [
          { toggleId: 'cut_custom_enabled', inputId: 'cut_custom' },
          { toggleId: 'other_custom_enabled', inputId: 'other_custom' },
          { toggleId: 'perm_custom_enabled', inputId: 'perm_custom' }
        ];

        function syncCustomPriceField(field, shouldFocus) {
          const toggle = document.getElementById(field.toggleId);
          const input = document.getElementById(field.inputId);
          if (!toggle || !input) return;
          input.disabled = !toggle.checked;
          if (!toggle.checked) input.value = '0';
          if (toggle.checked && shouldFocus) input.focus();
        }

        function syncCustomPriceFields(shouldFocus) {
          CUSTOM_PRICE_FIELDS.forEach(field => syncCustomPriceField(field, shouldFocus));
        }

        function resetCustomPriceFields() {
          CUSTOM_PRICE_FIELDS.forEach(field => {
            const toggle = document.getElementById(field.toggleId);
            const input = document.getElementById(field.inputId);
            if (toggle) toggle.checked = false;
            if (input) {
              input.value = '0';
              input.disabled = true;
            }
          });
        }

        function getEnabledCustomPrice(inputId) {
          const field = CUSTOM_PRICE_FIELDS.find(item => item.inputId === inputId);
          const toggle = field ? document.getElementById(field.toggleId) : null;
          const input = document.getElementById(inputId);
          if (!toggle?.checked || !input) return 0;
          return parseInt(input.value, 10) || 0;
        }
        /* 輸入人/助理 select：有值時文字變深色，空值時保持淺色 */
        document.addEventListener('change', function (e) {
          if (e.target.id === 'operator_select' || e.target.id === 'assistant_select') {
            e.target.style.color = e.target.value ? '' : '';
            e.target.classList.toggle('has-value', !!e.target.value);
          }
        });

        document.addEventListener('DOMContentLoaded', function () {
          const calendarEl = document.getElementById('calendar');
          if (calendarEl && isMobileLayout()) {
            mobileSelectedResourceId = ensureMobileResourceId();
            calendarEl.setAttribute('data-mobile-resource', mobileSelectedResourceId);
          }
          appointmentModal = document.getElementById('appointmentModal');
          leaveModal = document.getElementById('leaveModal');
          reportModal = document.getElementById('reportModal');
          lookupModal = document.getElementById('lookupModal');
          warnlistModal = document.getElementById('warnlistModal');

          form = document.getElementById('appointmentForm');
          leaveForm = document.getElementById('leaveForm');
          notesTextarea = document.getElementById('notes-content');
          phoneEl = document.getElementById('customer_phone');
          customerFields = document.getElementById('customer-fields-left');
          submitBtn = document.getElementById('submit-btn');
          deleteBtn = document.getElementById('deleteBtn');
          eventIdInput = document.getElementById('event_id');
          operatorSelect = document.getElementById('operator_select');
          assistantSelect = document.getElementById('assistant_select');
          amountInput = document.getElementById('amount_input');
          unsetPaidBtn = document.getElementById('unsetPaidBtn');
          lastVisitInfo = document.getElementById('last-visit-info');
          lastVisitInfoRight = document.getElementById('last-visit-info-right');
          appointmentContent = appointmentModal ? appointmentModal.querySelector('.modal-content') : null;
          appointmentActions = document.querySelector('#appointmentForm .modal-actions');
          appointmentActionsAnchor = document.getElementById('appointment-actions-anchor');
          appointmentInfoCard = document.getElementById('appointment-info-card');

          appointmentCloseButton = appointmentModal ? appointmentModal.querySelector('.close-button') : null;
          leaveCloseButton = leaveModal ? leaveModal.querySelector('.close-button') : null;
          reportCloseButton = reportModal ? reportModal.querySelector('.close-button') : null;
          lookupCloseButton = lookupModal ? lookupModal.querySelector('.close-button') : null;
          warnlistCloseButton = warnlistModal ? warnlistModal.querySelector('.close-button') : null;

          deleteLeaveBtn = document.getElementById('deleteLeaveBtn');

          function setAppointmentModalMode(mode) {
            if (!appointmentModal) return;
            appointmentModal.classList.toggle('is-create', mode === 'create');
            appointmentModal.classList.toggle('is-edit', mode === 'edit');
            appointmentModal.classList.toggle('is-blocked', mode === 'blocked');
          }

          // 既有預約彈窗：把左側「預約資訊」欄位鎖成唯讀（不含右側結帳區/金額/重置/刪除/儲存）。
          // 底部三顆按鈕「編輯 / 刪除預約 / 儲存」固定並排常駐（不依唯讀狀態切換可見性）；
          // 「編輯」鈕負責解鎖欄位，解鎖後（!on）變灰示意已可編輯。
          function setAppointmentReadonly(on) {
            if (!appointmentModal) return;
            appointmentModal.classList.toggle('is-readonly', !!on);
            const editBtn = document.getElementById('appointmentEditBtn');
            const isEdit = appointmentModal.classList.contains('is-edit');
            // 編輯鈕只在「既有預約（is-edit）」模式顯示；新增模式不需要。
            if (editBtn) {
              editBtn.style.display = isEdit ? 'inline-flex' : 'none';
              editBtn.classList.toggle('is-unlocked', isEdit && !on);
              editBtn.disabled = isEdit && !on;
            }
            // 刪除/儲存：既有預約模式常駐顯示；新增模式維持原本（由 placeAppointmentActions 控制 is-create 樣式）。
            if (submitBtn) submitBtn.style.display = 'inline-block';
            if (deleteBtn) deleteBtn.style.display = isEdit ? 'inline-block' : 'none';
            syncVisualAppointmentControls();
          }

          function syncOperatorRequired() {
            if (!operatorSelect) return;
            // 輸入人只在新增預約時必填；既有預約結帳/更新不要求重新選。
            operatorSelect.required = !(eventIdInput && eventIdInput.value);
          }

          function syncAssistantRequired() {
            if (!assistantSelect) return;
            // 店販助理一律非必填：儲存預約時不選助理也能通過驗證（使用者要求）。
            assistantSelect.required = false;
          }

          function placeAppointmentActions(mode) {
            if (!appointmentActions) return;
            setAppointmentModalMode(mode);
            if (appointmentActionsAnchor) appointmentActionsAnchor.appendChild(appointmentActions);
          }

          function formatAppointmentWhen(dateObj) {
            const dt = dateObj instanceof Date ? dateObj : new Date(dateObj);
            if (isNaN(dt.getTime())) return '請選擇時間';
            const parts = new Intl.DateTimeFormat('zh-TW', {
              timeZone: 'Asia/Taipei',
              year: 'numeric',
              month: '2-digit',
              day: '2-digit',
              weekday: 'short',
              hour: '2-digit',
              minute: '2-digit',
              hour12: false
            }).formatToParts(dt).reduce((acc, part) => {
              acc[part.type] = part.value;
              return acc;
            }, {});
            const weekday = parts.weekday && parts.weekday.startsWith('週') ? parts.weekday : `週${parts.weekday || ''}`;
            return `${parts.year}.${parts.month}.${parts.day}（${weekday}）· ${parts.hour}:${parts.minute}`;
          }

          function setAppointmentHeader(mode, startDate) {
            const titleEl = document.getElementById('appointment-modal-title');

            const current = document.getElementById('service_id')?.value || '';

              const selected = btn.dataset.serviceValue === current;

          function syncPaxToggle() {
            const input = document.getElementById('pax_count');
            const btnX2 = document.getElementById('pax_x2');
            const btnX3 = document.getElementById('pax_x3');
            if (!input || !btnX2 || !btnX3) return;
            let pax = parseInt(input.value, 10);
            if (!(pax >= 1 && pax <= 3)) pax = 1;
            input.value = String(pax);
            btnX2.classList.toggle('is-on', pax === 2);

          function syncDurationTooltip() {
            const durationInput = document.getElementById('duration_select');
            const tooltip = document.getElementById('duration_tooltip');
            if (durationInput && tooltip) {
              const val = Number(durationInput.value) || 30;
              tooltip.textContent = `${val} 分鐘`;
              const min = Number(durationInput.min) || 15;
              const max = Number(durationInput.max) || 60;
              const percent = ((val - min) / (max - min)) * 100;
              tooltip.style.left = `calc(${percent}% + (${12 - percent * 0.24}px))`;
            }
          }

                if (!durationInput) return;
                const step = Number(btn.dataset.durationStep) || 5;
                const min = Number(durationInput.min) || 5;
                const current = Number(durationInput.value) || min;
                durationInput.value = String(Math.max(min, current + step));
                durationInput.dispatchEvent(new Event('input', { bubbles: true }));
                durationInput.dispatchEvent(new Event('change', { bubbles: true }));
              });
            });

          function showToast(message, type = 'info', duration = 2000) {
            let container = document.getElementById('toast-container');
            if (!container) { container = document.createElement('div'); container.id = 'toast-container'; document.body.appendChild(container); }
            const toast = document.createElement('div');
            toast.className = `toast toast--${type}`; toast.textContent = message;
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.add('is-visible'));
            window.setTimeout(() => { toast.classList.remove('is-visible'); toast.addEventListener('transitionend', () => toast.remove(), { once: true }); }, duration);
          }

          function normalizePhone(value) {

          }

          // ===== 備註編碼：把「上次消費(唯讀)」與「自由備註(可編輯)」合併成單一 notes 字串 =====
          // 後端 notes 欄位不變，前端用 sentinel 前綴 + 分隔符把兩段編在一起。
          const LAST_VISIT_PREFIX = '【上次】';
          const NOTES_SEP = '⟦⟧';   // 自訂分隔符，避免與使用者輸入衝突

          // 解析既有 notes 字串 → { lastVisit, free }
          // 新格式：【上次】<上次消費>⟦⟧<自由備註>
          // 舊格式(已移除的 auto-fill 產物)：「上次：<日期> / <設計師> / <項目>」開頭、無 sentinel
          //   → 視為唯讀上次消費,存檔時 encodeNotes 會升級成新格式;換行後的內容當自由備註。
          // 其餘(無 sentinel、不以「上次：」開頭)：整段當自由備註,可編輯。
          const OLD_LAST_VISIT_PREFIXES = ['上次：', '上次:'];   // 全形冒號優先,半形保險
          function decodeNotes(raw) {
            const s = (raw == null ? '' : String(raw));
            if (s.startsWith(LAST_VISIT_PREFIX)) {
              const rest = s.slice(LAST_VISIT_PREFIX.length);
              const idx = rest.indexOf(NOTES_SEP);
              if (idx >= 0) {
                return { lastVisit: rest.slice(0, idx), free: rest.slice(idx + NOTES_SEP.length) };
              }
              return { lastVisit: rest, free: '' };
            }
            const oldPrefix = OLD_LAST_VISIT_PREFIXES.find(p => s.startsWith(p));
            if (oldPrefix) {
              const body = s.slice(oldPrefix.length);   // 去掉「上次：」前綴
              const nl = body.indexOf('\n');
              if (nl >= 0) {
                // 第一行為上次消費,換行後的內容當自由備註(連同後續換行一併保留)
                return { lastVisit: body.slice(0, nl).trim(), free: body.slice(nl + 1) };
              }
              return { lastVisit: body.trim(), free: '' };
            }
            return { lastVisit: '', free: s };
          }

          // 組合 → 單一 notes 字串。lastVisit 為空時只存自由備註(不加前綴)。
          function encodeNotes(lastVisit, free) {
            const lv = (lastVisit == null ? '' : String(lastVisit)).trim();
            const fr = (free == null ? '' : String(free));
            if (!lv) return fr;
            return LAST_VISIT_PREFIX + lv + NOTES_SEP + fr;
          }

          // 更新表單裡的「上次消費」唯讀區塊
          function setLastVisitNote(text) {
            const el = document.getElementById('last-visit-note');
            if (!el) return;
            const t = (text == null ? '' : String(text)).trim();
            el.dataset.raw = t;   // 存原始值供存檔重組，避免解析顯示文字
            el.textContent = t ? `上次消費　${t}` : '';
            el.hidden = !t;
          }

          function formatLastVisitLabel(rawStart) {
            if (!rawStart) return null;
            const normalized = String(rawStart || '').trim().replace(/\s+/g, 'T');
            const parsed = new Date(normalized);
            if (isNaN(parsed.getTime())) return String(rawStart).trim();
            const pad = v => String(v).padStart(2, '0');
            return `${parsed.getFullYear()}/${pad(parsed.getMonth() + 1)}/${pad(parsed.getDate())}`;
          }



          function updateLastVisitInfo(label, designerName) {
            const text = label ? `上次消費：${label}${designerName ? `（設計師：${designerName}）` : ''}` : '';
            if (lastVisitInfo) {
              lastVisitInfo.textContent = text;
              lastVisitInfo.hidden = !label;
            }
            if (lastVisitInfoRight) {
              lastVisitInfoRight.textContent = text;
              lastVisitInfoRight.hidden = !label;
            }
          }



          function removeEventOptimistically(eventId) {
            const ev = calendar.getEventById(String(eventId));
            if (!ev) return false;
            ev.remove(); return true;
          }

          function buildEventsUrl(startDate, endDate) {
            /* 抓取視窗放大為「當月 ±7 天」:同視窗內切日共用同一份快取,不必每換一天打一次 API(與正式版一致) */
            const winStart = new Date(startDate.getFullYear(), startDate.getMonth(), 1);
            winStart.setDate(winStart.getDate() - 7);
            const winEnd = new Date(endDate.getFullYear(), endDate.getMonth() + 1, 1);
            winEnd.setDate(winEnd.getDate() + 7);
            return APPS_SCRIPT_WEB_APP_URL + '?action=getEvents&start=' + ymd(winStart) + '&end=' + ymd(winEnd);
          }

          function currentEventsUrl() {
            if (!calendar || !calendar.view) return '';
            return buildEventsUrl(calendar.view.activeStart, calendar.view.activeEnd);
          }

          function isCalendarViewingEventsUrl(url) {
            return !!url && url === currentEventsUrl();
          }

          function formatLocalDateTime(date) {
            if (!date) return null;
            const pad = value => String(value).padStart(2, '0');
            return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
          }

          function saveCurrentEventsToCache() {
            const url = currentEventsUrl();
            if (!url) return;
            const data = calendar.getEvents().map(ev => {
              const resources = ev.getResources();
              const resourceId = resources && resources[0] ? String(resources[0].id) : '';
              return {
                id: ev.id,
                resourceId,
                title: ev.title,
                start: formatLocalDateTime(ev.start),
                end: formatLocalDateTime(ev.end),
                extendedProps: { ...ev.extendedProps }
              };
            });
            _apiCache[url] = { data, ts: Date.now() };
            writePersistentEventCache(url, data);
          }

              // [警示名單] 當輸入滿 10 碼，檢查是否在警示名單中（射後不理，不阻擋下方歷史查詢，兩者並行）
              if (d.length === 10) {

              // [CRM功能] 當輸入滿 10 碼且非編輯模式時，自動查詢歷史紀錄並追溯配方
              if (d.length === 10 && !eventIdInput.value) {

                    // 3. 嘗試匹配剪髮分類（依剪髮金額發亮提示，不自動勾選）
                    const histCut = parseInt(history.cut_price, 10);

              submitBtn.disabled = true; appointmentModal.style.display = 'none'; invalidateCache('getEvents'); showToast('儲存中...', 'loading', 3000);

            function stepDayView(dir) {
              if (!calendar) return;
              if (!calendar.view || calendar.view.type !== 'resourceTimeGridDay') { if (dir < 0) calendar.prev(); else calendar.next(); return; }

          function updateCalculatedTotal() {
            let cutPrice = 0;
            let chemTotal = 0;
            let totalCost = 0;

            let chemTriggerActive = false;
            let defaultChemCost = 0;

            const cut = document.querySelector('input[name="cut_price"]:checked');
            if (cut) {
              cutPrice = parseInt(cut.value, 10) || 0;
              totalCost += parseInt(cut.dataset.cost || 0, 10);
            }
            // [新增] 剪髮自訂
            cutPrice += getEnabledCustomPrice('cut_custom');

            document.querySelectorAll('input[name="other_item"]:checked').forEach(item => {
              const p = parseInt(item.value, 10) || 0;
              let c = parseInt(item.dataset.cost || 0, 10) || 0;
              const label = item.parentElement.textContent.trim();

              if (label.includes('漂4000')) {
                chemTriggerActive = true;
                defaultChemCost += c; // 累計漂4000的預設成本
              } else {
                totalCost += c; // 染髮、洗髮或其他
              }
              chemTotal += p;
            });
            // [新增] 其他自訂
            const oc = getEnabledCustomPrice('other_custom');
            if (oc > 0) chemTriggerActive = true;
            chemTotal += oc;

            const permRadio = document.querySelector('input[name="perm_price"]:checked');
            let permPrice = 0;
            if (permRadio) {
              permPrice = parseInt(permRadio.value, 10) || 0;
              totalCost += parseInt(permRadio.dataset.cost || 0, 10) || 0;
            }
            // [新增] 燙髮自訂
            const pc = getEnabledCustomPrice('perm_custom');
            if (pc > 0) chemTriggerActive = true;
            permPrice += pc;

            // 處理統一材料費
            const customMaterialVal = parseInt(document.getElementById('custom_material_cost').value, 10) || 0;
            if (chemTriggerActive) {
              if (customMaterialVal > 0) totalCost += customMaterialVal;
              else totalCost += defaultChemCost;
            }

            const retailInput = document.getElementById('retail_price');
            let retailVal = parseInt(retailInput?.value, 10) || 0;

            const displayTotal = cutPrice + chemTotal + permPrice + retailVal;
            const netAmount = displayTotal - totalCost;

            document.getElementById('display-total').textContent = '$' + displayTotal;
            document.getElementById('display-net').textContent = '$' + netAmount;
            const finalAmount = netAmount > 0 ? netAmount : '';
            document.getElementById('amount_input').value = finalAmount;

            // 更新全域 displayTotal
            window.displayTotal = displayTotal;

            if (unsetPaidBtn && eventIdInput.value) {
              const show = !document.querySelector('input[name="appointment_type"][value="blocked"]').checked && Number.isFinite(netAmount) && netAmount > 0;
              unsetPaidBtn.style.display = show ? 'inline-flex' : 'none';
            }
            syncAssistantRequired();
          }

          function toTaipeiIsoForApi(dateObj) {
            const dt = dateObj instanceof Date ? dateObj : new Date(dateObj);
            if (isNaN(dt.getTime())) return '';
            const parts = new Intl.DateTimeFormat('sv-SE', {
              timeZone: 'Asia/Taipei',
              year: 'numeric',
              month: '2-digit',
              day: '2-digit',
              hour: '2-digit',
              minute: '2-digit',
              second: '2-digit',
              hour12: false
            }).formatToParts(dt).reduce((acc, p) => {
              acc[p.type] = p.value;
              return acc;
            }, {});
            return `${parts.year}-${parts.month}-${parts.day}T${parts.hour}:${parts.minute}:${parts.second}+08:00`;
          }

          function populateTimeSelects(hour, minute) {
            const hourSel = document.getElementById('hour_select');
            const minSel = document.getElementById('minute_select');
            hourSel.innerHTML = '';
            minSel.innerHTML = '';
            for (let h = 12; h <= 20; h++) {
              const opt = document.createElement('option');
              opt.value = h;
              opt.textContent = String(h).padStart(2, '0');
              if (h === hour) opt.selected = true;
              hourSel.appendChild(opt);
            }
            for (let m = 0; m < 60; m += 5) {
              const opt = document.createElement('option');
              opt.value = m;
              opt.textContent = String(m).padStart(2, '0');
              if (m === minute) opt.selected = true;
              minSel.appendChild(opt);
            }
          }

            dt.setHours(selectedHour, selectedMinute, 0, 0);

            const labelInfos = Array.from(byTime.entries()).sort((a, b) => (a[0] < b[0] ? -1 : a[0] > b[0] ? 1 : 0)).map(([t, cell]) => {
              const text = String(t).slice(0, 5); const minute = parseInt(String(t).slice(3, 5), 10);

            const frames = Array.from(document.querySelectorAll('#calendar .fc-resourceTimeGridDay-view .fc-timegrid-col[data-resource-id] .fc-timegrid-col-frame'));

          function setDateHeaderParts(scroller, year, monthNum, dayNum, weekdayStr, isMonthView) {
            if (!scroller) return;
            const ghost = scroller.querySelector('.date-header-ghost');
            const monthEl = scroller.querySelector('.date-header-month');
            const wdEl = scroller.querySelector('.date-header-weekday');
            const mm = String(monthNum).padStart(2, '0');
            if (ghost) ghost.textContent = String(year);
            if (isMonthView) {
              if (monthEl) monthEl.textContent = `${mm} 月`;
              if (wdEl) wdEl.textContent = '';
            } else {
              const dd = String(dayNum).padStart(2, '0');
              if (monthEl) monthEl.textContent = `${mm} / ${dd}`;
              if (wdEl) wdEl.textContent = weekdayStr || '';
            }
          }

          function updateDateScroller(info) {
            const cal = document.getElementById('calendar');
            if (!cal || !info || !info.view) return;
            cal.classList.add('is-date-scroller');
            const scroller = ensureDateScroller(); if (!scroller) return; scroller.hidden = false;
            ensureMobileResourceToggle(scroller);

            // 根據視圖類型決定顯示日期（避免 selectedDate 與 view 不一致）
            let activeDate = null;
            if (info.view.type === 'resourceTimeGridDay') {
              activeDate = new Date(info.view.currentStart);
            } else if (info.view.type === 'dayGridMonth') {
              // 月視圖：以 view.currentStart（該月第一天）為基準，避免顯示到其他月份
              activeDate = new Date(info.view.currentStart);
            }

            // fallback: 使用 selectedDate 或 calendar.getDate()
            if (!activeDate) {
              if (selectedDate) activeDate = new Date(selectedDate);
              else activeDate = new Date(calendar.getDate());
            }
            activeDate.setHours(12, 0, 0, 0);
            const dateLocale = 'zh-TW';
            const monthRaw = new Intl.DateTimeFormat(dateLocale, { month: 'numeric' }).format(activeDate);

            // 更新顯示（重疊字：大型年份襯底 + 月/日前景 + 星期）
            {
              const _isMonth = !!(info.view && info.view.type === 'dayGridMonth');
              const _wd = new Intl.DateTimeFormat('en-US', { weekday: 'short' }).format(activeDate);

            const strip = scroller.querySelector('.date-strip');
            const dates = []; const activeBase = new Date(activeDate); activeBase.setHours(12, 0, 0, 0);
            if (activeBase.getDay() === 1) activeBase.setDate(activeBase.getDate() + 1);
            const before = []; const after = [];
            let cursor = new Date(activeBase);
            while (before.length < 7) { cursor.setDate(cursor.getDate() - 1); if (cursor.getDay() === 1) continue; before.push(new Date(cursor)); }
            cursor = new Date(activeBase);
            while (after.length < 7) { cursor.setDate(cursor.getDate() + 1); if (cursor.getDay() === 1) continue; after.push(new Date(cursor)); }
            dates.push(...before.reverse(), activeBase, ...after);

            strip.innerHTML = '';
            const currentKey = ymd(activeDate); const todayKey = ymd(new Date());
            const weekdayFmt = new Intl.DateTimeFormat(dateLocale, { weekday: 'narrow' });
            dates.forEach(d => {
              const dateKey = ymd(d);
              const btn = document.createElement('button'); btn.type = 'button'; btn.className = 'date-item';
              if (dateKey === currentKey) btn.classList.add('is-active');
              if (dateKey === todayKey) btn.classList.add('is-today');

              btn.innerHTML = `<span class="date-item-weekday">${weekdayFmt.format(d)}</span><span class="date-item-day">${d.getDate()}</span>`;
              // 單一觸發路徑:只用原生 click(滑鼠與觸控都會發);拖曳中不觸發
              btn.addEventListener('click', (e) => {

                strip.dataset.centerOnNextUpdate = '1';

              });
              strip.appendChild(btn);

            const active = strip.querySelector('.date-item.is-active');

              if (strip.dataset.centerOnNextUpdate === '1') {
                delete strip.dataset.centerOnNextUpdate;
                const targetLeft = active.offsetLeft - (strip.clientWidth - active.clientWidth) / 2;
                if (typeof strip.scrollTo === 'function') strip.scrollTo({ left: Math.max(0, targetLeft), behavior: 'smooth' });
                else strip.scrollLeft = Math.max(0, targetLeft);
              } else active.scrollIntoView({ block: 'nearest', inline: 'nearest' });
            }
          }

          function isMobileLayout() { return !!(window.matchMedia && window.matchMedia(MOBILE_RESOURCE_MEDIA_QUERY).matches); }

          function applyDateStripCurve(strip) {

            const items = Array.from(strip.querySelectorAll('.date-item'));
            const activeIndex = items.findIndex(i => i.classList.contains('is-active'));
            if (activeIndex === -1) return;
            items.forEach((item, idx) => {
              const dist = Math.abs(idx - activeIndex);
              item.style.setProperty('--arc-offset', `${Math.min(22, dist * 6)}px`);
              item.style.setProperty('--arc-scale', (dist === 0 ? 1.1 : Math.max(0.84, 1 - dist * 0.06)).toFixed(2));
              item.style.setProperty('--arc-opacity', (dist === 0 ? 1 : Math.max(0.5, 1 - dist * 0.08)).toFixed(2));

          }
          function selectDateFromItem(item) {
            if (!item || !item.dataset.date) return;
            const parts = item.dataset.date.split('-').map(Number);

            // 一次到位:已在日視圖只 gotoDate;否則 changeView 直接帶日期(避免連續兩輪重繪)
            if (calendar.view && calendar.view.type === 'resourceTimeGridDay') calendar.gotoDate(item.dataset.date);
            else calendar.changeView('resourceTimeGridDay', item.dataset.date);
            // 立即更新 header 顯示，避免視圖切換滯後時無反應感

                const _wd2 = new Intl.DateTimeFormat('en-US', { weekday: 'short' }).format(new Date(y, m - 1, d, 12));

          function syncDateToggleState(scroller, viewType) {

          function bindDateToggleActions(scroller) {
            if (!scroller || scroller.dataset.toggleBound === '1') return; scroller.dataset.toggleBound = '1';

          function enableDragScroll(strip) {
            /* 拖曳捲動:只綁一次(strip 元素不會換,重複綁會讓監聽器累積導致連發卡死);
               選日期統一交給 date-item 的 click,這裡只負責捲動與 dragging 旗標 */
            if (strip.dataset.dragBound === '1') return;
            strip.dataset.dragBound = '1';
            let isDown = false, startX, scrollLeft;
            strip.addEventListener('mousedown', (e) => { isDown = true; strip.dataset.dragging = '0'; startX = e.pageX; scrollLeft = strip.scrollLeft; strip.classList.add('active'); });
            strip.addEventListener('mouseleave', () => { isDown = false; strip.classList.remove('active'); });
            strip.addEventListener('mouseup', () => { isDown = false; strip.classList.remove('active'); setTimeout(() => { strip.dataset.dragging = '0'; }, 0); });
            strip.addEventListener('mousemove', (e) => { if (!isDown) return; e.preventDefault(); const x = e.pageX; const walk = (x - startX) * 2; strip.scrollLeft = scrollLeft - walk; strip.dataset.dragging = '1'; });
            // touch support
            strip.addEventListener('touchstart', (e) => { if (!e.touches || !e.touches[0]) return; isDown = true; strip.dataset.dragging = '0'; startX = e.touches[0].pageX; scrollLeft = strip.scrollLeft; strip.classList.add('active'); }, { passive: true });
            strip.addEventListener('touchend', () => { isDown = false; strip.classList.remove('active'); setTimeout(() => { strip.dataset.dragging = '0'; }, 0); });
            strip.addEventListener('touchmove', (e) => { if (!isDown || !e.touches || !e.touches[0]) return; const x = e.touches[0].pageX; const walk = (x - startX) * 2; strip.scrollLeft = scrollLeft - walk; strip.dataset.dragging = '1'; }, { passive: false });

                ov.appendChild(label); frame.appendChild(ov);

        const openReportBtn = document.getElementById('open-report-btn');

        function escapeHtml(value) {
          return String(value == null ? '' : value).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        function formatLookupDate(dateLike) {
          const raw = (dateLike instanceof Date) ? dateLike : String(dateLike || '').trim();
          if (!raw) return '';
          const parsed = new Date(raw);
          if (isNaN(parsed.getTime())) return '';

          const datePart = new Intl.DateTimeFormat('zh-TW', {
            timeZone: 'Asia/Taipei',
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            weekday: 'short'
          }).format(parsed);
          const timePart = new Intl.DateTimeFormat('zh-TW', {
            timeZone: 'Asia/Taipei',
            hour: '2-digit',
            minute: '2-digit',
            hour12: false
          }).format(parsed);
          return `${datePart} ${timePart}`;
        }

        function formatLookupDateByEvent(ev) {
          if (calendar && ev && ev.id != null) {
            const fcEv = calendar.getEventById(String(ev.id));
            if (fcEv && fcEv.start instanceof Date) {
              return formatLookupDate(fcEv.start);
            }
          }
          return formatLookupDate(ev ? ev.start : '');
        }

        function getLookupDesignerName(ev) {
          const ep = (ev && ev.extendedProps) ? ev.extendedProps : {};
          const rid = String((ev && ev.resourceId) || ep.employee_id || '').trim();
          return getDesignerNameById(rid) || rid || '未指定';
        }

        function renderLookupResult(events, phoneQuery, nameQuery) {
          if (!lookupResult) return;
          if (!events.length) {
            lookupResult.innerHTML = '<div class="lookup-empty">\u67E5\u7121\u7B26\u5408\u7684\u9810\u7D04\u8CC7\u6599</div>';
            return;
          }

          const now = Date.now();
          const items = events.map(ev => {
            const startTs = new Date(ev.start).getTime();
            return { ev, startTs, isPast: Number.isFinite(startTs) && startTs < now };
          });
          // items.sort((a, b) => (a.startTs || 0) - (b.startTs || 0)); // Old sort: ascending
          items.sort((a, b) => (b.startTs || 0) - (a.startTs || 0)); // New sort: descending (newest first)

          const finalList = items; // Show all items
          const headline = `\u5171 ${events.length} \u7B46\uFF0C\u986F\u793A ${finalList.length} \u7B46\uFF08\u6309\u6642\u9593\u5012\u5E8F\uFF09`;
          const keywordText = `\u95DC\u9375\u5B57\uFF1A${phoneQuery ? `\u96FB\u8A71 ${phoneQuery}` : ''}${phoneQuery && nameQuery ? ' / ' : ''}${nameQuery ? `\u59D3\u540D ${nameQuery}` : ''}`;
          const rows = finalList.map(({ ev, isPast }) => {
            const ep = ev.extendedProps || {};
            const designer = getLookupDesignerName(ev);
            const service = ep.service_id || '\u672A\u586B\u5BEB\u670D\u52D9';
            const customer = ep.customer_name || '\u672A\u586B\u5BEB\u59D3\u540D';
            const phone = ep.customer_phone || '-';
            const when = formatLookupDateByEvent(ev);
            const status = isPast ? '\u904E\u53BB' : '\u9810\u7D04';
            const price = Number(ep.total_amount || ep.amount || 0);
            const priceHtml = price > 0 ? `&nbsp;<span class="lookup-price">$${price.toLocaleString()}</span>` : '';
            return `
              <button type="button" class="lookup-item${isPast ? ' is-past' : ''}" data-event-id="${escapeHtml(ev.id)}" data-start="${escapeHtml(ev.start)}">
                <div class="lookup-item-top">
                  <span class="lookup-time">${escapeHtml(when)}</span>
                  <span class="lookup-status">${status}</span>
                </div>
                <div class="lookup-designer">\u8A2D\u8A08\u5E2B\uFF1A${escapeHtml(designer)}</div>
                <div class="lookup-item-main">${escapeHtml(customer)} <span class="lookup-phone">${escapeHtml(phone)}</span></div>
                <div class="lookup-item-sub">\u670D\u52D9\uFF1A${escapeHtml(service)}${priceHtml}</div>
              </button>
            `;
          }).join('');

          lookupResult.innerHTML = `
            <div class="lookup-summary">${escapeHtml(headline)}<br>${escapeHtml(keywordText)}</div>
            <div class="lookup-list">${rows}</div>
          `;

          lookupResult.querySelectorAll('.lookup-item').forEach(btn => {
            btn.addEventListener('click', () => {
              const eventId = String(btn.dataset.eventId || '').trim();
              const startIso = String(btn.dataset.start || '').trim();
              if (startIso && calendar) {
                const dt = new Date(startIso);
                if (!isNaN(dt.getTime())) {
                  selectedDate = new Date(dt.getTime());
                  selectedDate.setHours(12, 0, 0, 0);
                  calendar.changeView('resourceTimeGridDay', dt);
                  calendar.gotoDate(dt);
                }

              if (lookupModal) lookupModal.style.display = 'none';
              window.setTimeout(() => {
                const ev = calendar && eventId ? calendar.getEventById(eventId) : null;
                if (ev) openApptModalForEdit(ev);
              }, 220);
            });
          });

        function renderLookupResultPlain(events, phoneQuery) {

            lookupResult.innerHTML = '<div class="lookup-empty">\u67E5\u7121\u7B26\u5408\u7684\u9810\u7D04\u8CC7\u6599</div>';
            return;

          const rows = events.map(ev => {

                  <span class="lookup-status">\u9810\u7D04</span>

                <div class="lookup-item-sub">\u670D\u52D9\uFF1A${escapeHtml(ep.service_id || '-')}${priceHtml}</div>
              </div>
            `;
          }).join('');
          lookupResult.innerHTML = `
            <div class="lookup-summary">\u5171 ${events.length} \u7B46 \uFF5C \u96FB\u8A71 ${escapeHtml(phoneQuery || '')}</div>
            <div class="lookup-list">${rows}</div>

        function renderLookupResultSafely(events, phoneQuery, nameQuery) {
          try {
            renderLookupResult(events, phoneQuery, nameQuery);

        async function runLookupSearch() {
          if (!lookupResult) return;
          const phoneDigits = String(lookupPhone?.value || '').replace(/\D/g, '');
          if (!phoneDigits) {
            lookupResult.innerHTML = '<div class="lookup-empty">\u8ACB\u8F38\u5165\u96FB\u8A71</div>';
            return;
          }

          lookupResult.innerHTML = '<div style="text-align:center; padding:16px;">\u8CC7\u6599\u67E5\u8A62\u4E2D...</div>';
          const phoneMatch = (value) => {
            const d = String(value || '').replace(/\D/g, '');
            if (!d) return false;
            return d.includes(phoneDigits) || phoneDigits.includes(d);
          };
          let searchErr = null;
          try {
            const params = new URLSearchParams({
              action: 'searchAppointments',
              includePast: '1',
              limit: '120'
            });
            params.set('phone', phoneDigits);
            const res = await fetch(APPS_SCRIPT_WEB_APP_URL + '?' + params.toString(), { method: 'GET', mode: 'cors' });
            const raw = await res.json();
            if (!Array.isArray(raw) && raw && raw.status === 'error') {
              throw new Error(raw.message || 'searchAppointments failed');
            }
            const events = Array.isArray(raw) ? raw : (Array.isArray(raw?.events) ? raw.events : []);
            renderLookupResultSafely(events, phoneDigits, '');
            return;
          } catch (err) {
            searchErr = err;
            console.error('searchAppointments failed:', err);
            try {
              const r2 = await fetch(APPS_SCRIPT_WEB_APP_URL + '?action=getEvents', { method: 'GET', mode: 'cors' });
              const all = await r2.json();
              const events = Array.isArray(all) ? all.filter(ev => {
                const ep = ev.extendedProps || {};
                if (String(ep.appointment_type || '').toLowerCase() === 'blocked') return false;
                return phoneMatch(ep.customer_phone);
              }) : [];
              renderLookupResultSafely(events, phoneDigits, '');
            } catch (err2) {
              console.error('lookup fallback getEvents failed:', err2);
              lookupResult.innerHTML = '<div class="lookup-empty">\u67E5\u8A62\u5931\u6557\uFF0C\u8ACB\u7A0D\u5F8C\u518D\u8A66</div>';
            }
          }
        }

          const designerMap = { '1': '店長', '2': '雅婷', '3': '小白' };
          for (const [id, info] of Object.entries(data.designers)) {
            const commissionRate = String(id) === '1' ? 1 : 0.4;
            const commission = Math.round((info.totalAmount || 0) * commissionRate);
            html += `<tr><td style="text-align:center; font-weight:bold;">${designerMap[id] || id}</td><td class="num-cell">${info.count || 0}</td><td class="num-cell">${info.cutCount || info.count || 0}</td><td class="num-cell">${info.permCount || 0}</td><td class="num-cell">${info.dyeCount || 0}</td><td class="num-cell">$${(info.totalAmount || 0).toLocaleString()}</td><td class="num-cell" style="color:var(--md3-primary); font-weight:bold;">$${commission.toLocaleString()}</td></tr>`;
          }
          html += `</tbody></table>`;
          html += `<h4 style="margin-top:0; border-left:4px solid #e65100; padding-left:10px;">助理洗頭業績 (超過300顆, 每顆$20)</h4>`;
          html += `<table class="report-table"><thead><tr><th width="30%">助理姓名</th><th width="30%">洗頭數</th><th width="40%">業績獎金</th></tr></thead><tbody>`;
          for (const [name, info] of Object.entries(data.assistants)) {
            if (!name || name === 'undefined') continue;
            const excess = Math.max(0, (info.washCount || 0) - 300);
            html += `<tr><td style="text-align:center; font-weight:bold;">${name}</td><td class="num-cell">${info.washCount || 0} <span style="font-size:0.8em; color:var(--md3-on-surface-variant);">(超額 ${excess})</span></td><td class="num-cell" style="color:#e65100; font-weight:bold;">$${(excess * 20).toLocaleString()}</td></tr>`;
          }
          html += `</tbody></table>`;
          reportResult.innerHTML = html;
        }
      })();

      // ====== 警示名單管理 ======
      (function () {
        const openBtn = document.getElementById('open-warnlist-btn');
        const modal = document.getElementById('warnlistModal');
        const closeBtn = document.querySelector('.warnlist-close-button');
        const addBtn = document.getElementById('warn-add-btn');
        const phoneInput = document.getElementById('warn-phone');
        const noteInput = document.getElementById('warn-note');
        const listContainer = document.getElementById('warnlist-items');

        async function loadWarnList() {
          listContainer.innerHTML = '<div style="text-align:center; color:var(--md3-on-surface-variant); padding:12px;">載入中...</div>';
          try {
            const res = await fetch(APPS_SCRIPT_WEB_APP_URL + '?action=getWarnList', { method: 'GET', mode: 'cors' });
            const data = await res.json();
            if (!data || !data.list || data.list.length === 0) {
              listContainer.innerHTML = '<div style="text-align:center; color:var(--md3-on-surface-variant); padding:12px;">目前沒有警示名單</div>';
              return;
            }
            listContainer.innerHTML = data.list.map(item => `
              <div class="warnlist-item">
                <div class="warnlist-item-info">
                  <span class="warnlist-phone">${escapeHtml(item.phone)}</span>
                  <span class="warnlist-note">${escapeHtml(item.note || '')}</span>
                </div>
                <button type="button" class="warnlist-delete-btn" data-phone="${escapeHtml(item.phone)}">刪除</button>
              </div>
            `).join('');
            listContainer.querySelectorAll('.warnlist-delete-btn').forEach(btn => {
              btn.addEventListener('click', async function () {
                const phone = this.dataset.phone;
                if (!confirm(`確定要從警示名單移除 ${phone} 嗎？`)) return;
                try {
                  await fetch(APPS_SCRIPT_WEB_APP_URL, { method: 'POST', mode: 'cors', body: JSON.stringify({ action: 'deleteWarn', phone }) });
                  loadWarnList();
                } catch (err) { alert('刪除失敗: ' + err.message); }
              });
            });
          } catch (err) {
            listContainer.innerHTML = '<div style="text-align:center; color:#ff5252; padding:12px;">載入失敗</div>';
          }
        }

        if (openBtn) openBtn.addEventListener('click', () => {
          modal.style.display = 'block';
          loadWarnList();
        });

        if (addBtn) addBtn.addEventListener('click', async () => {
          const phone = (phoneInput.value || '').replace(/\D/g, '');
          const note = noteInput.value.trim();
          if (!phone || phone.length < 9) { alert('請輸入正確的電話號碼'); return; }
          if (!note) { alert('請輸入備註'); return; }
          try {
            addBtn.disabled = true;
            addBtn.textContent = '儲存中...';
            const res = await fetch(APPS_SCRIPT_WEB_APP_URL, { method: 'POST', mode: 'cors', body: JSON.stringify({ action: 'addWarn', phone, note }) });
            const result = await res.json();
            if (result.status === 'success') {
              phoneInput.value = ''; noteInput.value = '';
              showToast('已新增至警示名單', 'success', 2000);
              loadWarnList();
            } else {
              alert('新增失敗: ' + (result.message || '未知錯誤'));
            }
          } catch (err) { alert('新增失敗: ' + err.message); }
          finally { addBtn.disabled = false; addBtn.textContent = '新增'; }
        });

        // 電話輸入格式化
        if (phoneInput) phoneInput.addEventListener('input', (e) => {
          let d = String(e.target.value || '').replace(/\D/g, '').slice(0, 10);
          if (d.length >= 7) e.target.value = d.replace(/^(\d{4})(\d{3})(\d{0,3}).*$/, (_, a, b, c) => c ? `${a}-${b}-${c}` : `${a}-${b}`);
          else if (d.length >= 5) e.target.value = d.replace(/^(\d{4})(\d{0,3}).*$/, '$1-$2');
          else e.target.value = d;
        });
      })();

      // ====== 主題色設定（可在網頁上隨時改主色，存在本機 localStorage） ======
      (function () {
        const openBtn = document.getElementById('open-theme-btn');
        const modal = document.getElementById('themeModal');
        if (!openBtn || !modal) return;
        const closeBtn = modal.querySelector('.theme-close-button');
        const rowsEl = document.getElementById('theme-color-rows');
        const resetBtn = document.getElementById('theme-reset-btn');
        const applyBtn = document.getElementById('theme-apply-btn');
        const CONFIG = window.THEME_COLOR_KEYS || [];
        const PARAMS = window.THEME_PARAM_KEYS || [];

        // color input 只吃 #rrggbb；把目前生效色（自訂優先，否則 styles.css 預設）轉成 hex
        function toHex(v) {
          if (/^#[0-9a-fA-F]{6}$/.test(v)) return v.toLowerCase();
          const ctx = document.createElement('canvas').getContext('2d');
          ctx.fillStyle = v || '#000000';
          return ctx.fillStyle;
        }
        function currentColor(varName) {
          return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
        }

        // 每個顏色一列：標籤 + 取色器；改色即時套用並存檔
        function buildRows() {
          rowsEl.innerHTML = '';
          CONFIG.forEach((c) => {
            const row = document.createElement('div');
            row.style.cssText = 'display:flex; align-items:center; justify-content:space-between; gap:12px; padding:10px 4px; border-bottom:1px solid var(--line-soft); font-size:15px;';
            const span = document.createElement('span');
            span.textContent = c.label;
            const ctrl = document.createElement('span');
            ctrl.style.cssText = 'display:flex; align-items:center; gap:8px;';
            // HEX 文字框（顯示/可手動輸入色碼）
            const hex = document.createElement('input');
            hex.type = 'text';
            hex.maxLength = 7;
            hex.spellcheck = false;
            hex.value = toHex(currentColor(c.var));
            hex.style.cssText = 'width:84px; padding:5px 8px; font-family:monospace; font-size:13px; text-align:center; border:1px solid var(--line); border-radius:0; background:#fffdf8;';
            // 取色器色塊
            const input = document.createElement('input');
            input.type = 'color';
            input.value = toHex(currentColor(c.var));
            input.style.cssText = 'width:46px; height:30px; border:1px solid var(--line); border-radius:0; background:none; padding:0; cursor:pointer;';
            // 色塊 ↔ HEX 雙向同步；選色/改碼都先不套用，按「套用」才生效
            input.addEventListener('input', () => { hex.value = input.value; });
            hex.addEventListener('input', () => {
              let v = hex.value.trim();
              if (v && v[0] !== '#') v = '#' + v;
              if (/^#[0-9a-fA-F]{6}$/.test(v)) input.value = v.toLowerCase();
            });
            ctrl.appendChild(hex);
            ctrl.appendChild(input);
            row.appendChild(span);
            row.appendChild(ctrl);
            rowsEl.appendChild(row);
          });
          // 推導參數：每個一列（標籤 + 數值 + 滑桿）；拖動先不套用，按「套用」才生效
          PARAMS.forEach((p) => {
            const row = document.createElement('div');
            row.style.cssText = 'display:flex; align-items:center; justify-content:space-between; gap:12px; padding:10px 4px; border-bottom:1px solid var(--line-soft); font-size:15px;';
            const span = document.createElement('span');
            span.textContent = p.label;
            const ctrl = document.createElement('span');
            ctrl.style.cssText = 'display:flex; align-items:center; gap:8px;';
            const valSpan = document.createElement('span');
            valSpan.style.cssText = 'min-width:40px; text-align:right; font-family:monospace; font-size:13px;';
            const range = document.createElement('input');
            range.type = 'range';
            range.min = p.min; range.max = p.max; range.step = p.step;
            const cur = parseFloat(currentColor(p.var));
            range.value = isNaN(cur) ? p.min : cur;
            range.style.cssText = 'width:120px; accent-color: var(--brand);';
            valSpan.textContent = range.value + p.unit;
            range.addEventListener('input', () => { valSpan.textContent = range.value + p.unit; });
            ctrl.appendChild(valSpan);
            ctrl.appendChild(range);
            row.appendChild(span);
            row.appendChild(ctrl);
            rowsEl.appendChild(row);
          });
        }

        // 按「套用」才把所有取色器的值一次寫進 CSS 變數並存檔
        if (applyBtn) applyBtn.addEventListener('click', () => {
          const colorInputs = rowsEl.querySelectorAll('input[type="color"]');
          CONFIG.forEach((c, i) => {
            const v = colorInputs[i] && colorInputs[i].value;
            if (!v) return;
            document.documentElement.style.setProperty(c.var, v);
            try { localStorage.setItem(c.key, v); } catch (e) {}
          });
          const ranges = rowsEl.querySelectorAll('input[type="range"]');
          PARAMS.forEach((p, i) => {
            const r = ranges[i];
            if (!r) return;
            const val = r.value + p.unit;
            document.documentElement.style.setProperty(p.var, val);
            try { localStorage.setItem(p.key, val); } catch (e) {}
          });
          if (typeof showToast === 'function') showToast('已套用主題色', 'success', 1500);
          modal.style.display = 'none';
        });

        openBtn.addEventListener('click', () => { buildRows(); modal.style.display = 'block'; });
        if (closeBtn) closeBtn.addEventListener('click', () => { modal.style.display = 'none'; });
        // 不做「點外面關閉」：取色器是系統視窗，選完色回來的點擊會誤關彈窗

        if (resetBtn) resetBtn.addEventListener('click', () => {
          CONFIG.forEach((c) => {
            document.documentElement.style.removeProperty(c.var);
            try { localStorage.removeItem(c.key); } catch (e) {}
          });
          PARAMS.forEach((p) => {
            document.documentElement.style.removeProperty(p.var);
            try { localStorage.removeItem(p.key); } catch (e) {}
          });
          buildRows();
        });
      })();
    </script>
